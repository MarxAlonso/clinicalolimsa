<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel del Gerente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/gestioncitas.css">
  <style>
    .card-paciente {
  border: 1px solid #ddd;
  border-radius: 12px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card-paciente:hover {
  transform: scale(1.03);
  box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}

  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
      <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list text-white"></i>
      </div>
      <h4 class="logo-container">
        <img src="/img/logo-removebg-preview.png" class="logo-img" />
      </h4>
      <nav class="nav flex-column">
       <a class="nav-link" href="#"
          ><i class="bi bi-bar-chart"></i> <span>Estadísticas</span></a
        >
        <a class="nav-link" href="gestion_citas.html"
          ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
        >
        <a class="nav-link" href="gestion_medicos.html"
          ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
        >
        <a class="nav-link" href="gestion_medicamentos.html"
          ><i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span></a
        >
        <a class="nav-link" href="gestion_pacientes.html"
          ><i class="bi bi-people"></i> <span>Gestión de Pacientes</span></a
        >
      </nav>
      <a href="/index.html" class="btn btn-danger w-100 logout-link">
        <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
      </a>
    </div>
  <div class="content mt-5">
    <h2>Bienvenido al Panel Administrador</h2>
    <h3>Gestion de Pacientes</h3>
    
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3>Gestión de Pacientes</h3>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCrearPaciente">
            <i class="bi bi-person-plus"></i> Nuevo Paciente
          </button>
        </div>
      
        <input type="text" id="buscador" class="form-control mb-4" placeholder="Buscar paciente...">
      
        <div class="row" id="listaPacientes">
          <!-- Las tarjetas de pacientes se insertan aquí con JS -->
        </div>
      </div>
      
  </div>
  <script>
    const pacientes = [
      { nombre: "María", apellido: "Gonzales", dni: "12345678", fecha: "1990-01-01", telefono: "987654321" },
      { nombre: "Carlos", apellido: "Ramirez", dni: "23456789", fecha: "1985-05-12", telefono: "965432198" },
      { nombre: "Lucía", apellido: "Pérez", dni: "34567890", fecha: "2000-11-20", telefono: "912345678" }
    ];
  
    const contenedor = document.getElementById("listaPacientes");
    const buscador = document.getElementById("buscador");
  
    function renderizarPacientes(lista) {
      contenedor.innerHTML = "";
      lista.forEach(p => {
        contenedor.innerHTML += `
          <div class="col-md-6 col-lg-4 mb-4">
            <div class="card card-paciente p-3">
              <h5>${p.nombre} ${p.apellido}</h5>
              <p><strong>DNI:</strong> ${p.dni}</p>
              <p><strong>Fecha de Nacimiento:</strong> ${p.fecha}</p>
              <p><strong>Teléfono:</strong> ${p.telefono}</p>
              <div class="d-flex justify-content-between">
                <button class="btn btn-sm btn-warning"><i class="bi bi-pencil-square"></i></button>
                <button class="btn btn-sm btn-danger"><i class="bi bi-trash3"></i></button>
              </div>
            </div>
          </div>`;
      });
    }
  
    buscador.addEventListener("input", () => {
      const texto = buscador.value.toLowerCase();
      const filtrados = pacientes.filter(p =>
        (p.nombre + " " + p.apellido).toLowerCase().includes(texto)
      );
      renderizarPacientes(filtrados);
    });
  
    renderizarPacientes(pacientes);
  </script>
  
  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("collapsed");
    }
  </script>
</body>
</html>
