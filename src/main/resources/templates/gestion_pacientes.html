<!-- templates/gestion_pacientes.html -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list text-white"></i>
    </div>
    <h4 class="logo-text">LOLIMSA</h4>
    <nav class="nav flex-column">
        <a class="nav-link" href="#"
        ><i class="bi bi-bar-chart"></i> <span>Estadísticas</span></a
        >
        <a class="nav-link" href="gestion_citas.html"
        ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
        >
        <a class="nav-link" href="/gerente/medicos"
        ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
        >
        <a class="nav-link" href="/gerente/medicamentos">
            <i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span>
        </a>
        <a class="nav-link" href="/gerente/pacientes">
            <i class="bi bi-people"></i> <span>Gestión de Pacientes</span>
        </a>
    </nav>
    <a href="/" class="btn btn-danger w-100 logout-link">
        <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
    </a>
</div>
<div class="container mt-4">
    <h2>Gestión de Pacientes</h2>
    <a th:href="@{/gerente/pacientes/nuevo}" class="btn btn-primary mb-3">Nuevo Paciente</a>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Dirección</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${pacientes}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.firstName + ' ' + p.lastName}"></td>
            <td th:text="${p.email}"></td>
            <td th:text="${p.phone}"></td>
            <td th:text="${p.address}"></td>
            <td>
                <a th:href="@{'/gerente/pacientes/editar/' + ${p.id}}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{'/gerente/pacientes/eliminar/' + ${p.id}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Estás seguro de eliminar este paciente?');">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="/js/panelgeneral.js"></script>
</body>
</html>
