<!DOCTYPE html>
<html lang="en"

<body>

            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" placeholder="Contraseña" required>
        </div>
        <a href="panelgerente.html" type="submit" class="btn btn-custom mb-2">Iniciar</a>
        <a href="registro.html" type="button" class="btn btn-customr mb-2">Registrar</a>
