<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel del Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/panelgerente.css">
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list text-white"></i>
    </div>
    <h4 class="logo-text">LOLIMSA</h4>
    <nav class="nav flex-column">
        <a class="nav-link" href="#"
        ><i class="bi bi-bar-chart"></i> <span>Estadísticas</span></a
        >
        <a class="nav-link" href="gestion_citas.html"
        ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
        >
        <a class="nav-link" href="gestion_medicos.html"
        ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
        >
        <a class="nav-link" href="gestion_medicamentos.html"
        ><i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span></a
        >
        <a class="nav-link" href="gestion_pacientes.html"
        ><i class="bi bi-people"></i> <span>Gestión de Pacientes</span></a
        >
    </nav>
    <a href="/index.html" class="btn btn-danger w-100 logout-link">
        <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
    </a>
</div>
<div class="content mt-5">
    <img src="../static/img/logo-removebg-preview.png" alt="LOLIMSA" style="max-width: 200px; margin-bottom: 20px;">
    <h2>Bienvenido al Panel del Gerente</h2>
    <div class="row g-4 mt-3">
        <div class="col-md-6 col-lg-3">
            <div class="card p-3">
                <h5><i class="bi bi-bar-chart-line-fill"></i> Estadísticas</h5>
                <p>Total de citas: 240</p>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card p-3">
                <h5><i class="bi bi-person-badge-fill"></i> Médicos</h5>
                <p>Activos: 45</p>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card p-3">
                <h5><i class="bi bi-capsule"></i> Medicamentos</h5>
                <p>En stock: 120</p>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card p-3">
                <h5><i class="bi bi-people-fill"></i> Pacientes</h5>
                <p>Registrados: 150</p>
            </div>
        </div>
    </div>
</div>

<script src="/js/panelgeneral.js"></script>
</body>
</html>
