<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelpacientegeneral.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/pacientes/navbarpaciente.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <div class="welcome-section animate-fade-in">
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-person-circle fs-1"></i>
            <h2 th:text="'Bienvenido, ' + ${paciente.firstName + ' ' + paciente.lastName}" class="mb-0">Bienvenido</h2>
        </div>
    </div>

    <div class="card-custom animate-slide-up mt-4">
        <div class="card-header-custom">
            <i class="bi bi-calendar-check me-2"></i>
            <h3 class="mb-0 fs-5">Tus Citas Médicas</h3>
        </div>
        <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th><i class="bi bi-calendar2-date me-2"></i>Fecha</th>
                    <th><i class="bi bi-clock me-2"></i>Hora</th>
                    <th><i class="bi bi-person-vcard me-2"></i>Médico</th>
                    <th><i class="bi bi-clipboard2-pulse me-2"></i>Motivo</th>
                    <th><i class="bi bi-check-circle me-2"></i>Estado</th>
                    <th><i class="bi bi-journal-text me-2"></i>Observaciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cita : ${citas}" class="animate-card">
                    <td th:text="${#dates.format(cita.fecha, 'yyyy-MM-dd')}"></td>
                    <td th:text="${#dates.format(cita.hora, 'HH:mm')}"></td>
                    <td th:text="${cita.medico.nombres + ' ' + cita.medico.apellidos}"></td>
                    <td th:text="${cita.motivo}"></td>
                    <td>
                        <span th:class="${cita.estado == 'Completada' ? 'badge bg-success' : 'badge bg-primary'}" 
                              th:text="${cita.estado}"></span>
                    </td>
                    <td th:text="${cita.estado == 'Completada' ? cita.observaciones : '—'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
</script>

</body>
</html>
