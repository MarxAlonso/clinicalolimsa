<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Medicamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelpaciente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/pacientes/navbarpaciente.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <h2 th:text="'Bienvenido, ' + ${paciente.firstName + ' ' + paciente.lastName}">Bienvenido</h2>
    <!-- Filtros -->
    <div class="row mb-4">
        <div class="col-md-6">
            <input type="text" id="buscarNombre" class="form-control" placeholder="Buscar por nombre...">
        </div>
        <div class="col-md-6">
            <select id="filtrarTipo" class="form-select">
                <option value="">-- Filtrar por tipo --</option>
                <option th:each="tipo : ${tipos}" th:value="${tipo.nombre}" th:text="${tipo.nombre}"></option>
            </select>
        </div>
    </div>

    <!-- Cards -->
    <div class="row" id="medicamentosContainer">
        <div class="col-md-4 mb-4" th:each="med : ${medicamentos}"
             th:data-nombre="${med.nombre}"
             th:data-tipo="${med.tipo.nombre}">

            <div class="card card-custom h-100 shadow animate__animated animate__fadeIn"
                 th:data-id="${med.id}"
                 th:data-nombre="${med.nombre}"
                 th:data-descripcion="${med.descripcion}"
                 th:data-cantidad="${med.cantidad}"
                 th:data-precio="${med.precio}"
                 th:data-tipo="${med.tipo.nombre}"
                 th:data-fecha="${#dates.format(med.fechaVencimiento, 'dd/MM/yyyy')}"
                 th:data-imagen="${med.imagen}"
                 onclick="abrirModal(this)">
                <img th:src="@{/uploads/{img}(img=${med.imagen})}"
                     class="card-img-top img-fluid"
                     alt="Imagen del medicamento"
                     style="height: 200px; object-fit: cover; border-bottom: 2px solid var(--primary-color);">

                <div class="card-header card-header-custom bg-primary text-white">
                    <i class="bi bi-capsule"></i> <span th:text="${med.nombre}"></span>
                </div>

                <div class="card-body">
                    <p><strong>Descripción:</strong> <span th:text="${med.descripcion}"></span></p>
                    <p><strong>Cantidad:</strong> <span th:text="${med.cantidad}"></span></p>
                    <p><strong>Precio:</strong> S/. <span th:text="${med.precio}"></span></p>
                    <p><strong>Tipo:</strong> <span th:text="${med.tipo.nombre}"></span></p>
                    <p><strong>Fecha Venc.:</strong> <span th:text="${#dates.format(med.fechaVencimiento, 'dd/MM/yyyy')}"></span></p>
                </div>

                <div class="card-footer text-end bg-light">
                    <i class="bi bi-info-circle text-secondary"></i>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Modal para mostrar detalle del medicamento -->
<div class="modal fade" id="medicamentoModal" tabindex="-1" aria-labelledby="medicamentoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="medicamentoModalLabel">Detalle del Medicamento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <img id="modalImagen" class="img-fluid rounded mb-3" style="height: 200px; object-fit: cover;">
                <p><strong>Nombre:</strong> <span id="modalNombre"></span></p>
                <p><strong>Descripción:</strong> <span id="modalDescripcion"></span></p>
                <p><strong>Cantidad:</strong> <span id="modalCantidad"></span></p>
                <p><strong>Precio:</strong> S/. <span id="modalPrecio"></span></p>
                <p><strong>Tipo:</strong> <span id="modalTipo"></span></p>
                <p><strong>Fecha de Vencimiento:</strong> <span id="modalFecha"></span></p>
            </div>
            <div class="modal-footer">
                <a class="btn btn-success"><i class="bi bi-cart-plus"></i> Comprar</a>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
</script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const buscarInput = document.getElementById("buscarNombre");
        const tipoSelect = document.getElementById("filtrarTipo");
        const cards = document.querySelectorAll("#medicamentosContainer .col-md-4");

        function filtrar() {
            const texto = buscarInput.value.toLowerCase();
            const tipo = tipoSelect.value;

            cards.forEach(card => {
                const nombre = card.dataset.nombre.toLowerCase();
                const tipoMed = card.dataset.tipo;

                const coincideNombre = nombre.includes(texto);
                const coincideTipo = !tipo || tipoMed === tipo;

                card.style.display = (coincideNombre && coincideTipo) ? "block" : "none";
            });
        }

        buscarInput.addEventListener("input", filtrar);
        tipoSelect.addEventListener("change", filtrar);
    });
</script>
<script>
    function abrirModal(card) {
        // Obtener datos del medicamento
        const nombre = card.dataset.nombre;
        const descripcion = card.dataset.descripcion;
        const cantidad = card.dataset.cantidad;
        const precio = card.dataset.precio;
        const tipo = card.dataset.tipo;
        const fecha = card.dataset.fecha;
        const imagen = card.dataset.imagen;

        // Insertarlos en el modal
        document.getElementById('modalNombre').textContent = nombre;
        document.getElementById('modalDescripcion').textContent = descripcion;
        document.getElementById('modalCantidad').textContent = cantidad;
        document.getElementById('modalPrecio').textContent = precio;
        document.getElementById('modalTipo').textContent = tipo;
        document.getElementById('modalFecha').textContent = fecha;
        document.getElementById('modalImagen').src = `/uploads/${imagen}`;

        // Mostrar el modal
        const modal = new bootstrap.Modal(document.getElementById('medicamentoModal'));
        modal.show();
    }
</script>
</body>
</html>
