<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Medicamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelpaciente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/pacientes/navbarpaciente.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <h2 th:text="'Bienvenido, ' + ${paciente.firstName + ' ' + paciente.lastName}">Bienvenido</h2>
    <!-- Filtros -->
    <div class="row mb-4">
        <div class="col-md-6">
            <input type="text" id="buscarNombre" class="form-control" placeholder="Buscar por nombre...">
        </div>
        <div class="col-md-6">
            <select id="filtrarTipo" class="form-select">
                <option value="">-- Filtrar por tipo --</option>
                <option th:each="tipo : ${tipos}" th:value="${tipo.nombre}" th:text="${tipo.nombre}"></option>
            </select>
        </div>
    </div>

    <!-- Cards -->
    <div class="row" id="medicamentosContainer">
        <div class="col-md-4 mb-4" th:each="med : ${medicamentos}"
             th:data-nombre="${med.nombre}"
             th:data-tipo="${med.tipo.nombre}">

            <div class="card card-custom h-100 shadow animate__animated animate__fadeIn">
                <img th:src="@{/uploads/{img}(img=${med.imagen})}"
                     class="card-img-top img-fluid"
                     alt="Imagen del medicamento"
                     style="height: 200px; object-fit: cover; border-bottom: 2px solid var(--primary-color);">

                <div class="card-header card-header-custom bg-primary text-white">
                    <i class="bi bi-capsule"></i> <span th:text="${med.nombre}"></span>
                </div>

                <div class="card-body">
                    <p><strong>Descripción:</strong> <span th:text="${med.descripcion}"></span></p>
                    <p><strong>Cantidad:</strong> <span th:text="${med.cantidad}"></span></p>
                    <p><strong>Precio:</strong> S/. <span th:text="${med.precio}"></span></p>
                    <p><strong>Tipo:</strong> <span th:text="${med.tipo.nombre}"></span></p>
                    <p><strong>Fecha Venc.:</strong> <span th:text="${#dates.format(med.fechaVencimiento, 'dd/MM/yyyy')}"></span></p>
                </div>

                <div class="card-footer text-end bg-light">
                    <i class="bi bi-info-circle text-secondary"></i>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
</script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const buscarInput = document.getElementById("buscarNombre");
        const tipoSelect = document.getElementById("filtrarTipo");
        const cards = document.querySelectorAll("#medicamentosContainer .col-md-4");

        function filtrar() {
            const texto = buscarInput.value.toLowerCase();
            const tipo = tipoSelect.value;

            cards.forEach(card => {
                const nombre = card.dataset.nombre.toLowerCase();
                const tipoMed = card.dataset.tipo;

                const coincideNombre = nombre.includes(texto);
                const coincideTipo = !tipo || tipoMed === tipo;

                card.style.display = (coincideNombre && coincideTipo) ? "block" : "none";
            });
        }

        buscarInput.addEventListener("input", filtrar);
        tipoSelect.addEventListener("change", filtrar);
    });
</script>
</body>
</html>
