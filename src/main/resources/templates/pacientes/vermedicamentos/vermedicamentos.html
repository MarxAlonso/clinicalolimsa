<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Medicamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/paciente/panelpacientemedicamentos.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/pacientes/navbarpaciente.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <h2 th:text="'Bienvenido, ' + ${paciente.firstName + ' ' + paciente.lastName}">Bienvenido</h2>
    <!-- Filtros -->
    <div class="row mb-4">
        <div class="col-md-6">
            <input type="text" id="buscarNombre" class="form-control" placeholder="Buscar por nombre...">
        </div>
        <div class="col-md-6">
            <select id="filtrarTipo" class="form-select">
                <option value="">-- Filtrar por tipo --</option>
                <option th:each="tipo : ${tipos}" th:value="${tipo.nombre}" th:text="${tipo.nombre}"></option>
            </select>
        </div>
    </div>

    <!-- Cards -->
    <div class="row" id="medicamentosContainer">
        <div class="col-md-4 mb-4" th:each="med : ${medicamentos}"
             th:data-nombre="${med.nombre}"
             th:data-tipo="${med.tipo.nombre}">

            <div class="card card-custom h-100 shadow animate__animated animate__fadeIn"
                 th:data-id="${med.id}"
                 th:data-nombre="${med.nombre}"
                 th:data-descripcion="${med.descripcion}"
                 th:data-cantidad="${med.cantidad}"
                 th:data-precio="${med.precio}"
                 th:data-tipo="${med.tipo.nombre}"
                 th:data-fecha="${#dates.format(med.fechaVencimiento, 'dd/MM/yyyy')}"
                 th:data-imagen="${med.imagen}"
                 onclick="abrirModal(this)">
                <img th:src="@{/uploads/{img}(img=${med.imagen})}"
                     class="card-img-top img-fluid"
                     alt="Imagen del medicamento"
                     style="height: 200px; object-fit: cover; border-bottom: 2px solid var(--primary-color);">

                <div class="card-header card-header-custom bg-primary text-white">
                    <i class="bi bi-capsule"></i> <span th:text="${med.nombre}"></span>
                </div>

                <div class="card-body">
                    <p><strong>Descripción:</strong> <span th:text="${med.descripcion}"></span></p>
                    <p><strong>Cantidad:</strong> <span th:text="${med.cantidad}"></span></p>
                    <p><strong>Precio:</strong> S/. <span th:text="${med.precio}"></span></p>
                    <p><strong>Tipo:</strong> <span th:text="${med.tipo.nombre}"></span></p>
                    <p><strong>Fecha Venc.:</strong> <span th:text="${#dates.format(med.fechaVencimiento, 'dd/MM/yyyy')}"></span></p>
                </div>

                <div class="card-footer text-end bg-light">
                    <i class="bi bi-info-circle text-secondary"></i>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Modal para mostrar detalle del medicamento -->
<div class="modal fade" id="medicamentoModal" tabindex="-1" aria-labelledby="medicamentoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="medicamentoModalLabel">Detalle del Medicamento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <img id="modalImagen" class="img-fluid rounded mb-3" style="height: 200px; object-fit: cover;">
                <p><strong>Nombre:</strong> <span id="modalNombre"></span></p>
                <p><strong>Descripción:</strong> <span id="modalDescripcion"></span></p>
                <p><strong>Cantidad:</strong> <span id="modalCantidad"></span></p>
                <p><strong>Precio:</strong> S/. <span id="modalPrecio"></span></p>
                <p><strong>Tipo:</strong> <span id="modalTipo"></span></p>
                <p><strong>Fecha de Vencimiento:</strong> <span id="modalFecha"></span></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" onclick="abrirModalCompra()">
                    <i class="bi bi-cart-plus"></i> Comprar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Compra -->
<div class="modal fade" id="modalCompra" tabindex="-1" aria-labelledby="modalCompraLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalCompraLabel">Detalle del Medicamento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body">
                <img id="modalImagenCompra" class="img-fluid rounded mb-3" style="height: 200px; object-fit: cover;">
                <p><strong>Nombre:</strong> <span id="modalNombreCompra"></span></p>
                <p><strong>Descripción:</strong> <span id="modalDescripcionCompra"></span></p>
                <p><strong>Precio por unidad:</strong> S/. <span id="modalPrecioCompra"></span></p>

                <div class="mb-3">
                    <label for="cantidadCompra" class="form-label">Cantidad a comprar:</label>
                    <input type="number" id="cantidadCompra" class="form-control" value="1" min="1" onchange="calcularTotal()">
                </div>

                <p><strong>Total:</strong> S/. <span id="total">0.00</span></p>

                <div id="paypal-button-container"></div>
                <div id="result-message" class="mt-2 text-success"></div>

                <form id="formCompra" th:action="@{/pacientes/vermedicamentos/comprar}" method="post" th:object="${compra}">
                    <input type="hidden" name="medicamentoId" id="formMedicamentoId">
                    <input type="hidden" name="cantidad" id="formCantidad">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    let currentMedData = {};

    function abrirModal(element) {
      const id = element.getAttribute('data-id');
      const nombre = element.getAttribute('data-nombre');
      const descripcion = element.getAttribute('data-descripcion');
      const cantidad = element.getAttribute('data-cantidad');
      const precio = parseFloat(element.getAttribute('data-precio'));
      const tipo = element.getAttribute('data-tipo');
      const fecha = element.getAttribute('data-fecha');
      const imagen = element.getAttribute('data-imagen');

      currentMedData = { id, nombre, descripcion, precio, imagen };

      document.getElementById('modalNombre').textContent = nombre;
      document.getElementById('modalDescripcion').textContent = descripcion;
      document.getElementById('modalCantidad').textContent = cantidad;
      document.getElementById('modalPrecio').textContent = precio.toFixed(2);
      document.getElementById('modalTipo').textContent = tipo;
      document.getElementById('modalFecha').textContent = fecha;
      document.getElementById('modalImagen').src = `/uploads/${imagen}`;

      const modal = new bootstrap.Modal(document.getElementById('medicamentoModal'));
      modal.show();
    }

    function abrirModalCompra() {
      const modalDetalle = bootstrap.Modal.getInstance(document.getElementById('medicamentoModal'));
      modalDetalle.hide();

      document.getElementById('modalNombreCompra').textContent = currentMedData.nombre;
      document.getElementById('modalDescripcionCompra').textContent = currentMedData.descripcion;
      document.getElementById('modalPrecioCompra').textContent = currentMedData.precio.toFixed(2);
      document.getElementById('modalImagenCompra').src = `/uploads/${currentMedData.imagen}`;
      document.getElementById('formMedicamentoId').value = currentMedData.id;

      calcularTotal();

      const modalCompra = new bootstrap.Modal(document.getElementById('modalCompra'));
      modalCompra.show();
    }

    function calcularTotal() {
      const precio = parseFloat(document.getElementById('modalPrecioCompra').textContent);
      const cantidad = parseInt(document.getElementById('cantidadCompra').value) || 1;
      const total = precio * cantidad;
      document.getElementById('total').textContent = total.toFixed(2);
      document.getElementById('formCantidad').value = cantidad;
    }
</script>

<!-- PayPal JS SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=AewCjIDEEGGrDDlPnrDxw0HHhVphtTbgi3N81YJnHzRSKzkad8Kv1oAcanIMBobqmgraC_nbuNKxsBr6&buyer-country=US&currency=USD&components=buttons&enable-funding=venmo,paylater,card" data-sdk-integration-source="developer-studio"></script>
<script>
    paypal.Buttons({
      style: {
        layout: 'vertical',
        color: 'blue',
        shape: 'rect',
        label: 'paypal'
      },
      createOrder: function(data, actions) {
        const total = parseFloat(document.getElementById('total').textContent);
        return actions.order.create({
          purchase_units: [{ amount: { value: total.toFixed(2) } }]
        });
      },
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          document.getElementById('result-message').textContent = 'Pago completado por ' + details.payer.name.given_name;
          document.getElementById('formCompra').submit();
        });
      },
      onError: function(err) {
        console.error('Error en el pago:', err);
      }
    }).render('#paypal-button-container');
</script>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
</script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const buscarInput = document.getElementById("buscarNombre");
        const tipoSelect = document.getElementById("filtrarTipo");
        const cards = document.querySelectorAll("#medicamentosContainer .col-md-4");

        function filtrar() {
            const texto = buscarInput.value.toLowerCase();
            const tipo = tipoSelect.value;

            cards.forEach(card => {
                const nombre = card.dataset.nombre.toLowerCase();
                const tipoMed = card.dataset.tipo;

                const coincideNombre = nombre.includes(texto);
                const coincideTipo = !tipo || tipoMed === tipo;

                card.style.display = (coincideNombre && coincideTipo) ? "block" : "none";
            });
        }

        buscarInput.addEventListener("input", filtrar);
        tipoSelect.addEventListener("change", filtrar);
    });
</script>

</body>
</html>
