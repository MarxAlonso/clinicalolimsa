<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Medicamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/paciente/panelpaciente.css}">
</head>
<body class="animate-fade-in">
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/pacientes/navbarpaciente.js}"></script>

<!-- Contenido -->
<div class="container mt-4 animate-slide-up">
    <div class="welcome-section mb-4">
        <h2 class="display-6">
            <i class="bi bi-person-circle me-2"></i>
            <span th:text="'Bienvenido, ' + ${paciente.firstName + ' ' + paciente.lastName}">Bienvenido</span>
        </h2>
        <h2 class="h3">
            <i class="bi bi-bag-check-fill me-2"></i>
            Mis Compras
        </h2>
    </div>

    <!-- Filtro por fecha -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-calendar3"></i>
                </span>
                <input type="date" id="filtroFecha" class="form-control custom-input" onchange="filtrarPorFecha()" placeholder="Seleccionar fecha">
            </div>
        </div>
    </div>

    <!-- Cards de compras -->
    <div class="row" id="contenedorCompras">
        <div class="col-md-4 mb-4" th:each="compra : ${compras}" th:data-fecha="${#dates.format(compra.fechaCompra, 'yyyy-MM-dd')}">
            <div class="card h-100 shadow-sm card-custom animate-card">
                <div class="card-header card-header-custom">
                    <i class="bi bi-capsule me-2"></i>
                    <span th:text="${compra.medicamento.nombre}">Nombre Medicamento</span>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <i class="bi bi-123 me-2"></i>
                        <strong>Cantidad:</strong>
                        <span class="badge bg-primary ms-2 cantidad-span" th:text="${compra.cantidad}"></span>
                    </div>
                    <div class="mb-3">
                        <i class="bi bi-currency-dollar me-2"></i>
                        <strong>Total:</strong>
                        <span class="badge bg-success ms-2">S/. <span class="total-span" th:text="${compra.total}"></span></span>
                    </div>
                    <div>
                        <i class="bi bi-calendar-check me-2"></i>
                        <strong>Fecha de compra:</strong>
                        <div class="text-muted ms-4 mt-1">
                            <span th:text="${#dates.format(compra.fechaCompra, 'dd/MM/yyyy HH:mm')}"></span>
                        </div>
                    </div>
                    <button class="btn btn-outline-primary btn-sm rounded-pill"
                            onclick="abrirModalBoleta(this)"
                            data-bs-toggle="modal"
                            data-bs-target="#boletaModal">
                        <i class="bi bi-receipt me-1"></i> Abrir Boleta
                    </button>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Boleta -->
<div class="modal fade" id="boletaModal" tabindex="-1" aria-labelledby="boletaModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" id="contenidoBoleta">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-receipt me-2"></i> Boleta de Compra</h5>
                <button type="button" class="btn-close bg-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">

                <div class="text-center mb-3">
                    <h4 class="fw-bold"><i class="bi bi-person-circle me-1"></i><span id="nombrePacienteModal">Paciente</span></h4>
                </div>

                <div class="mb-3">
                    <i class="bi bi-capsule me-2"></i><strong>Medicamento:</strong>
                    <span id="medicamentoModal"></span>
                </div>

                <div class="mb-3">
                    <i class="bi bi-123 me-2"></i><strong>Cantidad:</strong>
                    <span id="cantidadModal"></span>
                </div>

                <div class="mb-3">
                    <i class="bi bi-currency-dollar me-2"></i><strong>Total:</strong>
                    <span class="badge bg-success">S/. <span id="totalModal"></span></span>
                </div>

                <div class="mb-3">
                    <i class="bi bi-calendar-check me-2"></i><strong>Fecha de compra:</strong>
                    <span id="fechaModal"></span>
                </div>

                <div class="text-center mt-4">
                    <button class="btn btn-danger rounded-pill shadow-sm" onclick="imprimirModalBoleta()">
                        <i class="bi bi-file-pdf-fill me-2"></i>Imprimir Boleta
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
<script th:inline="javascript">
    function abrirModalBoleta(boton) {
        const card = boton.closest(".card");

        // Obtener datos visibles del DOM
        const nombreMedicamento = card.querySelector(".card-header span").innerText.trim();
        const cantidad = card.querySelector(".cantidad-span")?.innerText.trim() || "";
        const total = card.querySelector(".total-span")?.innerText.trim() || "";
        const fecha = card.querySelector(".text-muted span")?.innerText.trim() || "";

        // Thymeleaf renderiza esto
        const nombrePaciente = /*[[${paciente.firstName + ' ' + paciente.lastName}]]*/ "Paciente";

        // Rellenar campos del modal
        document.getElementById("medicamentoModal").innerText = nombreMedicamento;
        document.getElementById("cantidadModal").innerText = cantidad;
        document.getElementById("totalModal").innerText = total;
        document.getElementById("fechaModal").innerText = fecha;
        document.getElementById("nombrePacienteModal").innerText = nombrePaciente;
    }
</script>


<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
<!-- html2canvas para capturar elementos -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
<!-- jsPDF para generar PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>

<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('d-none');
    }

    function filtrarPorFecha() {
        const fechaSeleccionada = document.getElementById('filtroFecha').value;
        const cards = document.querySelectorAll('#contenedorCompras > div');

        cards.forEach(card => {
            const fechaCard = card.getAttribute('data-fecha');
            if (!fechaSeleccionada || fechaCard === fechaSeleccionada) {
                card.style.display = '';
                card.querySelector('.card').classList.add('animate-card');
            } else {
                card.style.display = 'none';
            }
        });
    }
</script>
<script>
    async function imprimirModalBoleta() {
      const modalContent = document.getElementById("contenidoBoleta");

      const canvas = await html2canvas(modalContent, {
        scale: 3,
        useCORS: true
      });

      const imgData = canvas.toDataURL('image/png');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF();

      const pageWidth = pdf.internal.pageSize.getWidth();
      const imgWidth = pageWidth - 30;
      const imgHeight = (canvas.height * imgWidth) / canvas.width;

      pdf.addImage(imgData, 'PNG', 15, 20, imgWidth, imgHeight);
      pdf.save("boleta_compra.pdf");
    }
</script>

</body>
</html>
