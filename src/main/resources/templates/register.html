<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Best Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
      <link
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
              rel="stylesheet"
      />
      <link
              rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      />
      <link rel="stylesheet" href="css/registro.css" />
  </head>
  <body>
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
      <div class="card p-4 col-md-10 col-lg-8">
          <div class="text-center mb-4">
              <h3><i class="fas fa-user-plus me-2"></i>REGISTER</h3>
          </div>

          <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
              <strong>Account Created Successfully</strong>
              <a class="ms-2" href="/login">Login</a>
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>

          <form method="post" th:object="${registerDto}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

              <div class="row g-3">
                  <div class="col-md-6">
                      <label class="form-label">First Name</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-user"></i></span>
                          <input class="form-control" th:field="${registerDto.firstName}" placeholder="First Name" />
                      </div>
                      <p th:if="${#fields.hasErrors('firstName')}" th:errorclass="text-danger" th:errors="${registerDto.firstName}"></p>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Last Name</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-user"></i></span>
                          <input class="form-control" th:field="${registerDto.lastName}" placeholder="Last Name" />
                      </div>
                      <p th:if="${#fields.hasErrors('lastName')}" th:errorclass="text-danger" th:errors="${registerDto.lastName}"></p>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Email</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                          <input class="form-control" th:field="${registerDto.email}" placeholder="Email" />
                      </div>
                      <p th:if="${#fields.hasErrors('email')}" th:errorclass="text-danger" th:errors="${registerDto.email}"></p>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Phone</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-phone"></i></span>
                          <input class="form-control" th:field="${registerDto.phone}" placeholder="Phone" />
                      </div>
                      <p th:if="${#fields.hasErrors('phone')}" th:errorclass="text-danger" th:errors="${registerDto.phone}"></p>
                  </div>

                  <div class="col-md-12">
                      <label class="form-label">Address</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-home"></i></span>
                          <input class="form-control" th:field="${registerDto.address}" placeholder="Address" />
                      </div>
                      <p th:if="${#fields.hasErrors('address')}" th:errorclass="text-danger" th:errors="${registerDto.address}"></p>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Password</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-lock"></i></span>
                          <input type="password" class="form-control" th:field="${registerDto.password}" placeholder="Password" />
                      </div>
                      <p th:if="${#fields.hasErrors('password')}" th:errorclass="text-danger" th:errors="${registerDto.password}"></p>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Confirm Password</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-lock"></i></span>
                          <input type="password" class="form-control" th:field="${registerDto.confirmPassword}" placeholder="Confirm Password" />
                      </div>
                      <p th:if="${#fields.hasErrors('confirmPassword')}" th:errorclass="text-danger" th:errors="${registerDto.confirmPassword}"></p>
                  </div>
              </div>

              <div class="d-flex justify-content-center mt-4 gap-3">
                  <button type="submit" class="btn btn-success px-4 rounded-pill">
                      <i class="fas fa-save me-2"></i>Submit
                  </button>
                  <a href="/" class="btn btn-outline-danger px-4 rounded-pill">
                      <i class="fas fa-times me-2"></i>Cancel
                  </a>
              </div>
          </form>
      </div>
  </div>

  <!-- Bootstrap and icons -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  </body>
</html>
