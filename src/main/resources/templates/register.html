<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro Clinica Lolimsa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
      <link
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
              rel="stylesheet"
      />
      <link
              rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      />
      <link rel="stylesheet" th:href="@{/css/registro.css}" />
  </head>
  <body>
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
      <div class="card p-4 col-md-10 col-lg-9">
          <div class="text-center mb-4">
              <h3><i class="fas fa-user-plus me-2"></i>Registro de Paciente</h3>
          </div>

          <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
              <strong>¡Cuenta creada exitosamente!</strong>
              <a class="ms-2" href="/login">Iniciar sesión</a>
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>

          <form method="post" th:object="${registerPacienteDto}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

              <div class="row g-3">
                  <!-- Datos personales -->
                  <div class="col-md-6">
                      <label class="form-label">Nombre</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-user"></i></span>
                          <input class="form-control" th:field="*{firstName}" placeholder="Nombre"/>
                      </div>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Apellido</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-user"></i></span>
                          <input class="form-control" th:field="*{lastName}" placeholder="Apellido"/>
                      </div>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Email</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                          <input class="form-control" th:field="*{email}" placeholder="Correo electrónico"/>
                      </div>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Teléfono</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-phone"></i></span>
                          <input class="form-control" th:field="*{phone}" placeholder="Teléfono"/>
                      </div>
                  </div>

                  <div class="col-md-12">
                      <label class="form-label">Dirección</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-home"></i></span>
                          <input class="form-control" th:field="*{address}" placeholder="Dirección"/>
                      </div>
                  </div>

                  <!-- Más datos -->
                  <div class="col-md-6">
                      <label class="form-label">Sexo</label>
                      <select class="form-select" th:field="*{sexo}">
                          <option value="">Seleccionar</option>
                          <option value="Masculino">Masculino</option>
                          <option value="Femenino">Femenino</option>
                      </select>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Fecha de Nacimiento</label>
                      <input type="date" class="form-control" th:field="*{fechaNacimiento}"/>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Tipo de Sangre</label>
                      <input type="text" class="form-control" th:field="*{tipoSangre}" placeholder="Ej. O+"/>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">DNI / Pasaporte</label>
                      <input type="text" class="form-control" th:field="*{documentoIdentidad}" placeholder="Documento"/>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Nacionalidad</label>
                      <input type="text" class="form-control" th:field="*{nacionalidad}"/>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Estado Civil</label>
                      <input type="text" class="form-control" th:field="*{estadoCivil}"/>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Ocupación</label>
                      <input type="text" class="form-control" th:field="*{ocupacion}"/>
                  </div>

                  <!-- Emergencia -->
                  <div class="col-md-6">
                      <label class="form-label">Contacto de Emergencia - Nombre</label>
                      <input type="text" class="form-control" th:field="*{contactoEmergenciaNombre}"/>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Teléfono de Emergencia</label>
                      <input type="text" class="form-control" th:field="*{contactoEmergenciaTelefono}"/>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Relación con el contacto</label>
                      <input type="text" class="form-control" th:field="*{contactoEmergenciaRelacion}"/>
                  </div>

                  <!-- Salud -->
                  <div class="col-md-6">
                      <label class="form-label">Alergias</label>
                      <input type="text" class="form-control" th:field="*{alergias}" placeholder="Ej. Penicilina, Polen"/>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Enfermedades Previas</label>
                      <input type="text" class="form-control" th:field="*{enfermedadesPrevias}" placeholder="Ej. Diabetes, Asma"/>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Medicamentos Actuales</label>
                      <input type="text" class="form-control" th:field="*{medicamentosActuales}" placeholder="Ej. Ibuprofeno, Insulina"/>
                  </div>

                  <!-- Seguridad -->
                  <div class="col-md-6">
                      <label class="form-label">Contraseña</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-lock"></i></span>
                          <input type="password" class="form-control" th:field="*{password}" placeholder="Contraseña"/>
                      </div>
                  </div>

                  <div class="col-md-6">
                      <label class="form-label">Confirmar Contraseña</label>
                      <div class="input-group">
                          <span class="input-group-text"><i class="fas fa-lock"></i></span>
                          <input type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Repetir contraseña"/>
                      </div>
                  </div>
              </div>

              <div class="d-flex justify-content-center mt-4 gap-3">
                  <button type="submit" class="btn btn-success px-4 rounded-pill">
                      <i class="fas fa-save me-2"></i>Registrar
                  </button>
                  <a href="/" class="btn btn-outline-danger px-4 rounded-pill">
                      <i class="fas fa-times me-2"></i>Cancelar
                  </a>
              </div>
          </form>
      </div>
  </div>

  <!-- Bootstrap and icons -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  </body>
</html>
