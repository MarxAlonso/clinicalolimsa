<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Formulario Médico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="toggle-btn" onclick="toggleSidebar()">
    <i class="bi bi-list text-white"></i>
  </div>
  <h4 class="logo-text">LOLIMSA</h4>
  <nav class="nav flex-column">
    <a class="nav-link" href="/panelgerente"
    ><i class="bi bi-bar-chart"></i> <span>Panel</span></a
    >
    <a class="nav-link" href="gestion_citas.html"
    ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
    >
    <a class="nav-link" href="/gerente/medicos"
    ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
    >
    <a class="nav-link" href="/gerente/medicamentos">
      <i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span>
    </a>
    <a class="nav-link" href="/gerente/pacientes"
    ><i class="bi bi-people"></i> <span>Gestión de Pacientes</span></a
    >
  </nav>
  <a href="/" class="btn btn-danger w-100 logout-link">
    <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
  </a>
</div>
<div class="container mt-5">
  <h2 th:text="${medico.id == null} ? 'Agregar Médico' : 'Editar Médico'"></h2>
  <form th:action="@{/gerente/medicos/guardar}" th:object="${medico}" method="post">
    <input type="hidden" th:field="*{id}">
    <div class="mb-3">
      <label>Nombre</label>
      <input type="text" th:field="*{firstName}" class="form-control">
    </div>
    <div class="mb-3">
      <label>Apellido</label>
      <input type="text" th:field="*{lastName}" class="form-control">
    </div>
    <div class="mb-3">
      <label>Email</label>
      <input type="email" th:field="*{email}" class="form-control">
    </div>
    <div class="mb-3">
      <label>Teléfono</label>
      <input type="text" th:field="*{phone}" class="form-control">
    </div>
    <div class="mb-3">
      <label>Dirección</label>
      <input type="text" th:field="*{address}" class="form-control">
    </div>
    <div class="mb-3">
      <label>Contraseña</label>
      <input type="password" th:field="*{password}" class="form-control">
    </div>
    <button class="btn btn-primary" type="submit">Guardar</button>
    <a th:href="@{/gerente/medicos}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
<script src="/js/panelgeneral.js"></script>
</body>
</html>
