<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Tipos de Medicamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4 animate__animated animate__fadeIn">
    <h2 class="page-title">Lista de Tipos de Medicamentos</h2>

    <a href="/gerente/gerentetipodemedicamentos/nuevo" class="btn btn-add mb-3 animate__animated animate__fadeInRight">
        <i class="bi bi-plus-circle me-2"></i>Agregar Tipo de Medicamento
    </a>

    <div class="table-container">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="tipo : ${tipodemedicamentos}">
                <td th:text="${tipo.nombre}"></td>
                <td th:text="${tipo.descripcion}"></td>
                <td class="action-buttons">
                    <a th:href="@{'/gerente/gerentetipodemedicamentos/editar/' + ${tipo.id}}" class="btn btn-warning btn-sm">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <button class="btn btn-danger btn-sm" th:onclick="'eliminarTipo(' + ${tipo.id} + ')'">
                        <i class="bi bi-trash"></i> Eliminar
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    function eliminarTipo(id) {
        Swal.fire({
            title: '¿Estás seguro?',
            text: "Esta acción no se puede revertir",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#2c7e91',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Sí, eliminar',
            cancelButtonText: 'Cancelar',
            background: '#fff',
            customClass: {
                confirmButton: 'btn btn-primary',
                cancelButton: 'btn btn-danger'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = `/gerente/gerentetipodemedicamentos/eliminar/${id}`;
            }
        });
    }
</script>

</body>
</html>
