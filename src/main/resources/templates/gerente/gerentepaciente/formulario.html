<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="form-container animate__animated animate__fadeIn">
        <h2 class="page-title" th:text="${pacientes.id == null} ? 'Nuevo Paciente' : 'Editar Paciente'"></h2>

        <form th:action="@{/gerente/gerentepaciente/guardar}" th:object="${pacientes}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Nombres</label>
                <input type="text" th:field="*{firstName}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Apellidos</label>
                <input type="text" th:field="*{lastName}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" th:field="*{phone}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Dirección</label>
                <input type="text" th:field="*{address}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Sexo</label>
                <select th:field="*{sexo}" class="form-control">
                    <option value="">Seleccione</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de Nacimiento</label>
                <input type="date" th:field="*{fechaNacimiento}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo de Sangre</label>
                <input type="text" th:field="*{tipoSangre}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Documento de Identidad</label>
                <input type="text" th:field="*{documentoIdentidad}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Nacionalidad</label>
                <input type="text" th:field="*{nacionalidad}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Estado Civil</label>
                <select th:field="*{estadoCivil}" class="form-control">
                    <option value="">Seleccione</option>
                    <option value="Soltero">Soltero</option>
                    <option value="Casado">Casado</option>
                    <option value="Viudo">Viudo</option>
                    <option value="Divorciado">Divorciado</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Ocupación</label>
                <input type="text" th:field="*{ocupacion}" class="form-control">
            </div>

            <hr>

            <h5>Contacto de Emergencia</h5>

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" th:field="*{contactoEmergenciaNombre}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" th:field="*{contactoEmergenciaTelefono}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Relación</label>
                <input type="text" th:field="*{contactoEmergenciaRelacion}" class="form-control">
            </div>

            <hr>

            <div class="mb-3">
                <label class="form-label">Alergias</label>
                <textarea th:field="*{alergias}" class="form-control" rows="2"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Enfermedades Previas</label>
                <textarea th:field="*{enfermedadesPrevias}" class="form-control" rows="2"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Medicamentos Actuales</label>
                <textarea th:field="*{medicamentosActuales}" class="form-control" rows="2"></textarea>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success me-2">Guardar</button>
                <a th:href="@{/gerente/gerentepaciente}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.14.5" integrity="sha384-ueC9FHE/gdG6Xjlev9kT8QDLO/Yskgm0nfhNXN+N1odFWNO4nxt2I0gz5PsbkJs2" crossorigin="anonymous"></script>
</body>
</html>
