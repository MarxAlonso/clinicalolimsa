<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h2>Lista de Medicos</h2>
        <a href="/gerente/gerentemedicos/nuevo" class="btn btn-primary">Nuevo Medico</a>
        <a href="/gerente/gerentemedicos/exportar/excel" class="btn btn-success">Exportar Excel</a>
    </div>

    <!-- Contenedor con scroll horizontal -->
    <div style="overflow-x: auto; white-space: nowrap;">
        <table class="table table-bordered table-striped" style="min-width: 1200px;">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombres</th>
                <th>Apellidos</th>
                <th>DNI</th>
                <th>Fecha de Nacimiento</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Especialidad</th>
                <th>N° Colegiatura</th>
                <th>Universidad</th>
                <th>Fecha Graduación</th>
                <th>Experiencia</th>
                <th>Turno</th>
                <th>Género</th>
                <th>Sueldo</th>
                <th>Fecha Contratación</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="medico : ${medicos}">
                <td th:text="${medico.id}"></td>
                <td th:text="${medico.nombres}"></td>
                <td th:text="${medico.apellidos}"></td>
                <td th:text="${medico.dni}"></td>
                <td th:text="${medico.fechaNacimiento}"></td>
                <td th:text="${medico.correo}"></td>
                <td th:text="${medico.telefono}"></td>
                <td th:text="${medico.direccion}"></td>
                <td th:text="${medico.especialidad}"></td>
                <td th:text="${medico.numeroColegiatura}"></td>
                <td th:text="${medico.universidad}"></td>
                <td th:text="${medico.fechaGraduacion}"></td>
                <td th:text="${medico.tiempoExperiencia} + ' años'"></td>
                <td th:text="${medico.turno}"></td>
                <td th:text="${medico.genero}"></td>
                <td th:text="${medico.sueldo}"></td>
                <td th:text="${medico.fechaContratacion}"></td>
                <td>
                    <a th:href="@{/gerente/gerentemedicos/editar/{id}(id=${medico.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/gerente/gerentemedicos/eliminar/{id}(id=${medico.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Estás seguro de eliminar este médico?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
