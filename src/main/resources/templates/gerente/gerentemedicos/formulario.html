<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="form-container animate__animated animate__fadeIn">
        <h2 class="page-title" th:text="${medicos.id == null} ? 'Nuevo Médico' : 'Editar Médico'"></h2>

        <form th:action="@{/gerente/gerentemedicos/guardar}" th:object="${medicos}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Nombres</label>
                <input type="text" th:field="*{nombres}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Apellidos</label>
                <input type="text" th:field="*{apellidos}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">DNI</label>
                <input type="text" th:field="*{dni}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de Nacimiento</label>
                <input type="date" th:field="*{fechaNacimiento}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" th:field="*{correo}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" th:field="*{contrasena}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" th:field="*{telefono}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Dirección</label>
                <input type="text" th:field="*{direccion}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Sueldo</label>
                <input type="number" step="0.01" th:field="*{sueldo}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Especialidad</label>
                <input type="text" th:field="*{especialidad}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Número de Colegiatura</label>
                <input type="text" th:field="*{numeroColegiatura}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Universidad</label>
                <input type="text" th:field="*{universidad}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de Graduación</label>
                <input type="date" th:field="*{fechaGraduacion}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Años de Experiencia</label>
                <input type="number" th:field="*{tiempoExperiencia}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Turno</label>
                <select th:field="*{turno}" class="form-select" required>
                    <option value="">-- Seleccione un turno --</option>
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche">Noche</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Género</label>
                <select th:field="*{genero}" class="form-select" required>
                    <option value="">-- Seleccione género --</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de Contratación</label>
                <input type="date" th:field="*{fechaContratacion}" class="form-control" required>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success me-2">Guardar</button>
                <a th:href="@{/gerente/gerentepanel}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.14.5" integrity="sha384-ueC9FHE/gdG6Xjlev9kT8QDLO/Yskgm0nfhNXN+N1odFWNO4nxt2I0gz5PsbkJs2" crossorigin="anonymous"></script>
</body>
</html>
