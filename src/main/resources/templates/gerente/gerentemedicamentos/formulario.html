<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Medicamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="form-container animate__animated animate__fadeIn">
        <h2 class="page-title" th:text="${medicamentos.id == null} ? 'Nuevo Medicamento' : 'Editar Medicamento'"></h2>
        <form th:action="@{/gerente/gerentemedicamentos/guardar}" th:object="${medicamentos}" method="post" enctype="multipart/form-data" id="medicamentoForm">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3 animate__animated animate__fadeInUp" style="animation-delay: 0.1s">
                <label class="form-label">Nombre</label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>

            <div class="mb-3 animate__animated animate__fadeInUp" style="animation-delay: 0.2s">
                <label class="form-label">Descripción</label>
                <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3 animate__animated animate__fadeInUp" style="animation-delay: 0.3s">
                <label class="form-label">Cantidad</label>
                <input type="number" th:field="*{cantidad}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Precio</label>
                <input type="number" th:field="*{precio}" step="0.01" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cantidad Medida</label>
                <input type="number" th:field="*{cantidadMedida}" step="0.01" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Unidad de Medida</label>
                <input type="text" th:field="*{unidadMedida}" class="form-control" placeholder="Ej: ml, g, tabletas" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de Vencimiento</label>
                <input type="date" th:field="*{fechaVencimiento}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo de Medicamento</label>
                <select class="form-select" th:field="*{tipo.id}" required>
                    <option value="" disabled selected>Seleccione un tipo</option>
                    <option th:each="tipo : ${tipodemedicamentos}"
                            th:value="${tipo.id}"
                            th:text="${tipo.nombre}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Proveedor</label>
                <select class="form-select" th:field="*{proveedor.id}" required>
                    <option value="" disabled selected>Seleccione un proveedor</option>
                    <option th:each="prov : ${proveedores}"
                            th:value="${prov.id}"
                            th:text="${prov.nombreEmpresa}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Imagen Actual</label><br>
                <img th:if="${medicamentos.imagen}" th:src="@{'/uploads/' + ${medicamentos.imagen}}" width="100" alt="Imagen del medicamento">
                <input type="hidden" th:field="*{imagen}">
            </div>

            <div class="mb-3">
                <label class="form-label">Cambiar Imagen</label>
                <input type="file" name="imagenFile" class="form-control">
            </div>

            <div class="mt-4 animate__animated animate__fadeInUp" style="animation-delay: 0.5s">
                <button type="submit" class="btn btn-success me-2">Guardar</button>
                <a href="/gerente/gerentemedicamentos" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<!-- SweetAlert y Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Confirmación antes de enviar -->
<script>
    document.getElementById('medicamentoForm').addEventListener('submit', function (e) {
        e.preventDefault();
        Swal.fire({
            title: '¿Guardar Medicamento?',
            text: "Confirma que deseas guardar los cambios.",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#198754',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Sí, guardar',
            cancelButtonText: 'Cancelar'
        }).then((result) => {
            if (result.isConfirmed) {
                this.submit();
            }
        });
    });
</script>
<script src="/js/panelgeneral.js"></script>
</body>
</html>
