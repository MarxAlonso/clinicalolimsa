<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h2>Lista de Proveedores</h2>
        <a href="/gerente/gerenteproveedores/nuevo" class="btn btn-primary">Nuevo Proveedor</a>
        <a href="/gerente/gerenteproveedores/exportar/excel" class="btn btn-success mb-3">
            Exportar Proveedores a Excel
        </a>
    </div>

    <!-- Scroll horizontal -->
    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre de Empresa</th>
                <th>RUC</th>
                <th>Dirección</th>
                <th>Teléfono</th>
                <th>Nombre del Gerente</th>
                <th>DNI del Gerente</th>
                <th>Tipo de Proveedor</th>
                <th>País de Origen</th>
                <th>Fecha de Registro</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="prov : ${proveedores}">
                <td th:text="${prov.id}"></td>
                <td th:text="${prov.nombreEmpresa}"></td>
                <td th:text="${prov.ruc}"></td>
                <td th:text="${prov.direccion}"></td>
                <td th:text="${prov.telefono}"></td>
                <td th:text="${prov.nombreGerente}"></td>
                <td th:text="${prov.dniGerente}"></td>
                <td th:text="${prov.tipoProveedor}"></td>
                <td th:text="${prov.paisOrigen}"></td>
                <td th:text="${#dates.format(prov.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></td>
                <td>
                    <a th:href="@{/gerente/gerenteproveedores/editar/{id}(id=${prov.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/gerente/gerenteproveedores/eliminar/{id}(id=${prov.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Estás seguro de eliminar este proveedor?')">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
