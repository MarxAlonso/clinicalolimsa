<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/gerente/panelgerenteproveedor.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <!-- Sección de bienvenida -->
    <div class="welcome-section fade-in mb-4">
        <i class="bi bi-building"></i>
        <h1>Gestión de Proveedores Médicos</h1>
        <p class="text-muted">Administre los proveedores de medicamentos y suministros médicos</p>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4 slide-in">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" class="form-control" placeholder="Buscar proveedores..." id="searchInput">
        </div>
        <div class="action-buttons">
            <a href="/gerente/gerenteproveedores/nuevo" class="btn btn-primary me-2">
                <i class="bi bi-plus-circle"></i> Nuevo Proveedor
            </a>
            <a href="/gerente/gerenteproveedores/exportar/excel" class="btn btn-success">
                <i class="bi bi-file-earmark-excel"></i> Exportar a Excel
            </a>
        </div>
    </div>

    <div class="table-responsive card-table fade-in">
        <table class="table table-hover">
            <thead>
            <tr>
                <th><i class="bi bi-hash"></i> ID</th>
                <th><i class="bi bi-building"></i> Empresa</th>
                <th><i class="bi bi-upc"></i> RUC</th>
                <th><i class="bi bi-geo-alt"></i> Dirección</th>
                <th><i class="bi bi-telephone"></i> Teléfono</th>
                <th><i class="bi bi-person-badge"></i> Gerente</th>
                <th><i class="bi bi-card-text"></i> DNI</th>
                <th><i class="bi bi-tags"></i> Tipo</th>
                <th><i class="bi bi-globe"></i> País</th>
                <th><i class="bi bi-calendar-check"></i> Registro</th>
                <th><i class="bi bi-gear"></i> Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="prov : ${proveedores}" class="table-row-hover">
                <td th:text="${prov.id}"></td>
                <td>
                    <i class="bi bi-building text-primary"></i>
                    <span th:text="${prov.nombreEmpresa}"></span>
                </td>
                <td>
                    <span class="badge bg-info" th:text="${prov.ruc}"></span>
                </td>
                <td>
                    <i class="bi bi-geo-alt text-secondary"></i>
                    <span th:text="${prov.direccion}"></span>
                </td>
                <td>
                    <i class="bi bi-telephone text-success"></i>
                    <span th:text="${prov.telefono}"></span>
                </td>
                <td>
                    <i class="bi bi-person-circle text-primary"></i>
                    <span th:text="${prov.nombreGerente}"></span>
                </td>
                <td>
                    <span class="badge bg-secondary" th:text="${prov.dniGerente}"></span>
                </td>
                <td>
                    <span class="badge bg-primary" th:text="${prov.tipoProveedor}"></span>
                </td>
                <td>
                    <i class="bi bi-globe text-info"></i>
                    <span th:text="${prov.paisOrigen}"></span>
                </td>
                <td>
                    <i class="bi bi-calendar3"></i>
                    <span th:text="${#dates.format(prov.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></span>
                </td>
                <td class="action-buttons">
                    <a th:href="@{/gerente/gerenteproveedores/editar/{id}(id=${prov.id})}" class="btn btn-warning btn-sm me-1">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a th:href="@{/gerente/gerenteproveedores/eliminar/{id}(id=${prov.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Estás seguro de eliminar este proveedor?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
