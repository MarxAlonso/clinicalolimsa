<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/gerente/panelgerproveeform.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="form-container card shadow-sm animate__animated animate__fadeIn">
        <div class="card-header bg-gradient">
            <h2 class="page-title mb-0 d-flex align-items-center">
                <i class="bi bi-building me-2"></i>
                <span th:text="${proveedor.id == null} ? 'Nuevo Proveedor' : 'Editar Proveedor'"></span>
            </h2>
        </div>
        <div class="card-body">
            <form th:action="@{/gerente/gerenteproveedores/guardar}" th:object="${proveedor}" method="post" class="needs-validation" novalidate>
                <input type="hidden" th:field="*{id}">

                <div class="mb-3 form-floating">
                    <input type="text" th:field="*{nombreEmpresa}" class="form-control input-animate" id="nombreEmpresa" required>
                    <label for="nombreEmpresa"><i class="bi bi-building-fill me-2"></i>Nombre de la Empresa</label>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nombreEmpresa')}" th:errors="*{nombreEmpresa}"></div>
                </div>

                <div class="mb-3 form-floating">
                    <input type="text" th:field="*{ruc}" class="form-control input-animate" id="ruc" required>
                    <label for="ruc"><i class="bi bi-upc-scan me-2"></i>RUC</label>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('ruc')}" th:errors="*{ruc}"></div>
                </div>

                <div class="mb-3 form-floating">
                    <input type="text" th:field="*{direccion}" class="form-control input-animate" id="direccion" required>
                    <label for="direccion"><i class="bi bi-geo-alt-fill me-2"></i>Dirección</label>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></div>
                </div>

                <div class="mb-3 form-floating">
                    <input type="text" th:field="*{telefono}" class="form-control input-animate" id="telefono" required>
                    <label for="telefono"><i class="bi bi-telephone-fill me-2"></i>Teléfono</label>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                </div>

                <div class="mb-3 form-floating">
                    <input type="text" th:field="*{nombreGerente}" class="form-control input-animate" id="nombreGerente" required>
                    <label for="nombreGerente"><i class="bi bi-person-fill me-2"></i>Nombre del Gerente</label>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nombreGerente')}" th:errors="*{nombreGerente}"></div>
                </div>

                <div class="mb-3 form-floating">
                    <input type="text" th:field="*{dniGerente}" class="form-control input-animate" id="dniGerente" required>
                    <label for="dniGerente"><i class="bi bi-card-text me-2"></i>DNI del Gerente</label>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dniGerente')}" th:errors="*{dniGerente}"></div>
                </div>

                <div class="mb-3 form-floating">
                    <input type="text" th:field="*{tipoProveedor}" class="form-control input-animate" id="tipoProveedor" required>
                    <label for="tipoProveedor"><i class="bi bi-tags-fill me-2"></i>Tipo de Proveedor</label>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tipoProveedor')}" th:errors="*{tipoProveedor}"></div>
                </div>

                <div class="mb-3 form-floating">
                    <input type="text" th:field="*{paisOrigen}" class="form-control input-animate" id="paisOrigen" required>
                    <label for="paisOrigen"><i class="bi bi-globe2 me-2"></i>País de Origen</label>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('paisOrigen')}" th:errors="*{paisOrigen}"></div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-lg px-4">
                        <i class="bi bi-save me-2"></i>Guardar
                    </button>
                    <a th:href="@{/gerente/gerenteproveedores}" class="btn btn-secondary btn-lg px-4">
                        <i class="bi bi-x-circle me-2"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.14.5" integrity="sha384-ueC9FHE/gdG6Xjlev9kT8QDLO/Yskgm0nfhNXN+N1odFWNO4nxt2I0gz5PsbkJs2" crossorigin="anonymous"></script>
<script src="/js/panelgeneral.js"></script>
</body>
</html>
