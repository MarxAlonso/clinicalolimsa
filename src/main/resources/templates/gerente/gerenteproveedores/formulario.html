<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Proveedores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="form-container animate__animated animate__fadeIn">
        <h2 class="page-title" th:text="${proveedor.id == null} ? 'Nuevo Proveedor' : 'Editar Proveedor'"></h2>
        <form th:action="@{/gerente/gerenteproveedores/guardar}" th:object="${proveedor}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Nombre de la Empresa</label>
                <input type="text" th:field="*{nombreEmpresa}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">RUC</label>
                <input type="text" th:field="*{ruc}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Dirección</label>
                <input type="text" th:field="*{direccion}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" th:field="*{telefono}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre del Gerente</label>
                <input type="text" th:field="*{nombreGerente}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">DNI del Gerente</label>
                <input type="text" th:field="*{dniGerente}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo de Proveedor</label>
                <input type="text" th:field="*{tipoProveedor}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">País de Origen</label>
                <input type="text" th:field="*{paisOrigen}" class="form-control" required>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success me-2">Guardar</button>
                <a th:href="@{/gerente/gerenteproveedores}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/panelgeneral.js"></script>
</body>
</html>
