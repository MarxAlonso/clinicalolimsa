<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Compras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/gerente/panelgerentecompras.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="welcome-section fade-in mb-4">
        <i class="bi bi-bag"></i>
        <h1>Compras Realizadas por Pacientes</h1>
        <p class="text-muted">Listado de medicamentos adquiridos</p>
    </div>

    <div class="table-responsive card-table fade-in">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Paciente</th>
                <th>Medicamento</th>
                <th>Cantidad</th>
                <th>Total (S/.)</th>
                <th>Fecha de Compra</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="compra : ${compras}">
                <td th:text="${compra.id}"></td>
                <td th:text="${compra.paciente.firstName + ' ' + compra.paciente.lastName}"></td>
                <td th:text="${compra.medicamento.nombre}"></td>
                <td th:text="${compra.cantidad}"></td>
                <td th:text="'S/. ' + ${#numbers.formatDecimal(compra.total, 1, 'POINT', 2, 'POINT')}"></td>
                <td th:text="${#dates.format(compra.fechaCompra, 'dd/MM/yyyy HH:mm')}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="d-flex justify-content-end mb-3">
    <label for="mesSelect" class="me-2">Filtrar por mes:</label>
    <select id="mesSelect" class="form-select w-auto">
        <option value="todos">Todos</option>
        <option value="01">Enero</option>
        <option value="02">Febrero</option>
        <option value="03">Marzo</option>
        <option value="04">Abril</option>
        <option value="05">Mayo</option>
        <option value="06">Junio</option>
        <option value="07">Julio</option>
        <option value="08">Agosto</option>
        <option value="09">Septiembre</option>
        <option value="10">Octubre</option>
        <option value="11">Noviembre</option>
        <option value="12">Diciembre</option>
    </select>
</div>

<!-- Gráfico de Compras por Fecha -->
<div class="card mt-5 p-4 fade-in">
    <h3 class="text-center mb-4">Ganancias Totales por Fecha</h3>
    <canvas id="comprasChart" width="400" height="200"></canvas>
</div>

<div class="text-center mt-3">
    <button class="btn btn-outline-primary" onclick="exportarGrafico()">Exportar como Imagen</button>
</div>
<br>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    let compras = /*[[${compras}]]*/ [];
</script>
<script th:src="@{/js/gerente/gerentecompraslista.js}"></script>

</body>
</html>
