<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Almacen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="form-container animate__animated animate__fadeIn">
        <h2 class="page-title" th:text="${almacen.id == null} ? 'Nuevo Registro en Almacén' : 'Editar Registro de Almacén'"></h2>

        <form th:action="@{/gerente/gerentealmacen/guardar}" th:object="${almacen}" method="post">
            <input type="hidden" th:field="*{id}">

            <!-- Medicamento -->
            <div class="mb-3">
                <label class="form-label">Medicamento</label>
                <select th:field="*{medicamento}" class="form-select" required>
                    <option value="">-- Selecciona un medicamento --</option>
                    <option th:each="med : ${medicamentos}"
                            th:value="${med.id}"
                            th:text="${med.nombre}"
                            th:selected="${almacen.medicamento != null and med.id == almacen.medicamento.id}">
                    </option>
                </select>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('medicamento')}" th:errors="*{medicamento}"></div>
            </div>

            <!-- Ubicación -->
            <div class="mb-3">
                <label class="form-label">Ubicación</label>
                <input type="text" th:field="*{ubicacion}" class="form-control" required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('ubicacion')}" th:errors="*{ubicacion}"></div>
            </div>

            <!-- Fecha de Ingreso -->
            <div class="mb-3">
                <label class="form-label">Fecha de Ingreso</label>
                <input type="datetime-local" th:field="*{fechaIngreso}" class="form-control" required>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fechaIngreso')}" th:errors="*{fechaIngreso}"></div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success me-2">Guardar</button>
                <a th:href="@{/gerente/gerentealmacen}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.14.5" integrity="sha384-ueC9FHE/gdG6Xjlev9kT8QDLO/Yskgm0nfhNXN+N1odFWNO4nxt2I0gz5PsbkJs2" crossorigin="anonymous"></script>
</body>
</html>
