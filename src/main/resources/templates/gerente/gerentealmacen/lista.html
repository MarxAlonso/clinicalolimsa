<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Almacen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/gerente/navbargerente.js}"></script>

<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h2>Lista de Almacen</h2>
        <a href="/gerente/gerentealmacen/nuevo" class="btn btn-primary">Nuevo Almacen</a>
        <a href="/gerente/gerentealmacen/exportar/excel" class="btn btn-success mb-3">
            Exportar Almacén a Excel
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Medicamento</th>
                <th>Ubicación</th>
                <th>Fecha de Ingreso</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="alm : ${almacenes}">
                <td th:text="${alm.id}"></td>
                <td th:text="${alm.medicamento.nombre}"></td>
                <td th:text="${alm.ubicacion}"></td>
                <td th:text="${#dates.format(alm.fechaIngreso, 'yyyy-MM-dd HH:mm')}"></td>
                <td>
                    <a th:href="@{|/gerente/gerentealmacen/editar/${alm.id}|}" class="btn btn-warning">Editar</a>
                    <a th:href="@{|/gerente/gerentealmacen/eliminar/${alm.id}|}" class="btn btn-danger">Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
