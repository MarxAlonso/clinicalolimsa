<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Datos de Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelpaciente.css}">
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list text-white"></i>
    </div>
    <h4 class="logo-text animate__animated animate__fadeIn">LOLIMSA</h4>
    <nav class="nav flex-column">
        <a class="nav-link animate__animated animate__fadeInLeft" href="/panelpaciente">
            <i class="bi bi-calendar-check"></i> <span>Mis Citas</span>
        </a>
        <a class="nav-link animate__animated animate__fadeInLeft" href="#">
            <i class="bi bi-file-medical"></i> <span>Historia Clínica</span>
        </a>
        <a class="nav-link animate__animated animate__fadeInLeft" href="#">
            <i class="bi bi-capsule"></i> <span>Medicamentos</span>
        </a>
        <a class="nav-link animate__animated animate__fadeInLeft" href="/panelpaciente/perfil">
            <i class="bi bi-person-circle"></i> <span>Mi Perfil</span>
        </a>
        <a class="nav-link animate__animated animate__fadeInLeft" href="/panelpaciente/datos">
            <i class="bi bi-clipboard-pulse"></i> <span>Datos del Paciente</span>
        </a>
    </nav>
    <a href="/" class="btn btn-danger w-100 logout-link animate__animated animate__fadeInUp">
        <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
    </a>
</div>

<div class="container mt-5">
    <h3>Rellene sus Datos</h3>
    <form method="post" th:action="@{/panelpaciente/datos}" th:object="${pacienteDto}">
        <div class="row g-3">
            <div class="col-md-6">
                <label>DNI</label>
                <input class="form-control" th:field="*{dni}" />
            </div>
            <div class="col-md-6">
                <label>Género</label>
                <select class="form-select" th:field="*{genero}">
                    <option value="">Seleccione</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                </select>
            </div>
            <div class="col-md-6">
                <label>Grupo Sanguíneo</label>
                <input class="form-control" th:field="*{grupoSanguineo}" placeholder="Ej: O+, A-, AB+" />
            </div>
            <div class="col-md-3">
                <label>Altura (m)</label>
                <input type="number" step="0.01" class="form-control" th:field="*{altura}" />
            </div>
            <div class="col-md-3">
                <label>Peso (kg)</label>
                <input type="number" step="0.1" class="form-control" th:field="*{peso}" />
            </div>
            <div class="col-md-12">
                <label>Alergias</label>
                <textarea class="form-control" th:field="*{alergias}"></textarea>
            </div>
            <div class="col-md-12">
                <label>Enfermedades Crónicas</label>
                <textarea class="form-control" th:field="*{enfermedadesCronicas}"></textarea>
            </div>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Guardar</button>
    </form>
</div>

<script src="/js/panelgeneral.js"></script>
</body>
</html>
