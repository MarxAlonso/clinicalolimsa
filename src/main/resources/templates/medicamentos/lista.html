<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Lista de Medicamentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
    <link rel="stylesheet" th:href="@{/css/listamedicamento.css}">
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="toggle-btn" onclick="toggleSidebar()">
    <i class="bi bi-list text-white"></i>
  </div>
  <h4 class="logo-text">LOLIMSA</h4>
  <nav class="nav flex-column">
    <a class="nav-link" href="#"
    ><i class="bi bi-bar-chart"></i> <span>Estadísticas</span></a
    >
    <a class="nav-link" href="gestion_citas.html"
    ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
    >
    <a class="nav-link" href="gestion_medicos.html"
    ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
    >
    <a class="nav-link" href="/gerente/medicamentos">
      <i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span>
    </a>
    <a class="nav-link" href="gestion_pacientes.html"
    ><i class="bi bi-people"></i> <span>Gestión de Pacientes</span></a
    >
  </nav>
  <a href="/" class="btn btn-danger w-100 logout-link">
    <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
  </a>
</div>
<div class="container mt-4 animate__animated animate__fadeIn">
  <h2 class="page-title">Lista de Medicamentos</h2>
  <a href="/gerente/medicamentos/nuevo" class="btn btn-add mb-3 animate__animated animate__fadeInRight">
      <i class="bi bi-plus-circle me-2"></i>Agregar Medicamento
  </a>
  <div class="table-container">
      <table class="table table-hover">
          <thead>
              <tr>
                  <th>Nombre</th>
                  <th>Descripción</th>
                  <th>Cantidad</th>
                  <th>Precio</th>
                  <th>Acciones</th>
              </tr>
          </thead>
          <tbody>
              <tr th:each="med : ${medicamentos}" class="animate__animated animate__fadeIn">
                  <td th:text="${med.nombre}"></td>
                  <td th:text="${med.descripcion}"></td>
                  <td th:text="${med.cantidad}"></td>
                  <td th:text="${med.precio}"></td>
                  <td class="action-buttons">
                      <a th:href="@{'/gerente/medicamentos/editar/' + ${med.id}}" class="btn btn-warning btn-sm">
                          <i class="bi bi-pencil"></i> Editar
                      </a>
                      <button class="btn btn-danger btn-sm" th:onclick="'eliminarMedicamento(' + ${med.id} + ')'">
                          <i class="bi bi-trash"></i> Eliminar
                      </button>
                  </td>
              </tr>
          </tbody>
      </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function eliminarMedicamento(id) {
  Swal.fire({
      title: '¿Estás seguro?',
      text: "Esta acción no se puede revertir",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#2c7e91',
      cancelButtonColor: '#d33',
      confirmButtonText: 'Sí, eliminar',
      cancelButtonText: 'Cancelar',
      background: '#fff',
      customClass: {
          confirmButton: 'btn btn-primary',
          cancelButton: 'btn btn-danger'
      }
  }).then((result) => {
      if (result.isConfirmed) {
          window.location.href = `/gerente/medicamentos/eliminar/${id}`;
      }
  });
}
</script>
  <script src="/js/panelgeneral.js"></script>
</body>
</html>
