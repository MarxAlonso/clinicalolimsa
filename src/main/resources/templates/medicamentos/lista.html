<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Lista de Medicamentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="toggle-btn" onclick="toggleSidebar()">
    <i class="bi bi-list text-white"></i>
  </div>
  <h4 class="logo-text">LOLIMSA</h4>
  <nav class="nav flex-column">
    <a class="nav-link" href="#"
    ><i class="bi bi-bar-chart"></i> <span>Estadísticas</span></a
    >
    <a class="nav-link" href="gestion_citas.html"
    ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
    >
    <a class="nav-link" href="gestion_medicos.html"
    ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
    >
    <a class="nav-link" href="/gerente/medicamentos">
      <i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span>
    </a>
    <a class="nav-link" href="gestion_pacientes.html"
    ><i class="bi bi-people"></i> <span>Gestión de Pacientes</span></a
    >
  </nav>
  <a href="/" class="btn btn-danger w-100 logout-link">
    <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
  </a>
</div>
<div class="container mt-4">
  <h2>Lista de Medicamentos</h2>
  <a href="/gerente/medicamentos/nuevo" class="btn btn-primary mb-3">Agregar Medicamento</a>
  <table class="table">
    <thead>
    <tr>
      <th>Nombre</th>
      <th>Descripción</th>
      <th>Cantidad</th>
      <th>Precio</th>
      <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="med : ${medicamentos}">
      <td th:text="${med.nombre}"></td>
      <td th:text="${med.descripcion}"></td>
      <td th:text="${med.cantidad}"></td>
      <td th:text="${med.precio}"></td>
      <td>
        <a th:href="@{'/gerente/medicamentos/editar/' + ${med.id}}" class="btn btn-warning btn-sm">Editar</a>
        <a th:href="@{'/gerente/medicamentos/eliminar/' + ${med.id}}" class="btn btn-danger btn-sm">Eliminar</a>
      </td>
    </tr>
    </tbody>
  </table>

  <script src="/js/panelgeneral.js"></script>
</div>
</body>
</html>
