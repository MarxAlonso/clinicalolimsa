<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Medicamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelgerente.css}">
    <link rel="stylesheet" th:href="@{/css/formmedicamento.css}">
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list text-white"></i>
    </div>
    <h4 class="logo-text">LOLIMSA</h4>
    <nav class="nav flex-column">
        <a class="nav-link" href="/panelgerente"
        ><i class="bi bi-bar-chart"></i> <span>Panel</span></a
        >
        <a class="nav-link" href="gestion_citas.html"
        ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
        >
        <a class="nav-link" href="/gerente/medicos"
        ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
        >
        <a class="nav-link" href="/gerente/medicamentos">
            <i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span>
        </a>
        <a class="nav-link" href="/gerente/pacientes"
        ><i class="bi bi-people"></i> <span>Gestión de Pacientes</span></a
        >
    </nav>
    <a href="/" class="btn btn-danger w-100 logout-link">
        <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
    </a>
</div>
<div class="container mt-4">
    <div class="form-container animate__animated animate__fadeIn">
        <h2 class="page-title" th:text="${proveedor.id == null} ? 'Nuevo Proveedor' : 'Editar Proveedor'"></h2>
        <form th:action="@{/gerente/proveedores/guardar}" th:object="${proveedor}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3 animate__animated animate__fadeInUp">
                <label class="form-label">Nombre de la Empresa</label>
                <input type="text" th:field="*{nombreEmpresa}" class="form-control" required>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-success me-2">Guardar</button>
                <a th:href="@{/gerente/proveedores}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/js/panelgeneral.js"></script>
</body>
</html>
