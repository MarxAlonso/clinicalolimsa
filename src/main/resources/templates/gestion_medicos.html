<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestión de Médicos - LOLIMSA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/gestioncitas.css}">
</head>
<body>
    <div class="sidebar" id="sidebar">
      <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list text-white"></i>
      </div>
      <h4 class="logo-container">
        <img src="/img/logo-removebg-preview.png" class="logo-img" />
      </h4>
      <nav class="nav flex-column">
       <a class="nav-link" href="#"
          ><i class="bi bi-bar-chart"></i> <span>Estadísticas</span></a
        >
        <a class="nav-link" href="gestion_citas.html"
          ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
        >
        <a class="nav-link" href="/gerente/medicos"
          ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
        >
        <a class="nav-link" href="/gerente/medicamentos"
          ><i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span></a
        >
        <a class="nav-link" href="/gerente/pacientes"
          ><i class="bi bi-people"></i> <span>Gestión de Pacientes</span></a
        >
      </nav>
      <a href="/" class="btn btn-danger w-100 logout-link">
        <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
      </a>
    </div>
    <div class="container mt-5">
      <h2>Gestión de Médicos</h2>
      <a th:href="@{/gerente/medicos/nuevo}" class="btn btn-success mb-3">Agregar Médico</a>

      <table class="table table-bordered">
        <thead>
        <tr>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Teléfono</th>
          <th>Dirección</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="medico : ${medicos}">
          <td th:text="${medico.firstName + ' ' + medico.lastName}"></td>
          <td th:text="${medico.email}"></td>
          <td th:text="${medico.phone}"></td>
          <td th:text="${medico.address}"></td>
          <td>
            <a th:href="@{/gerente/medicos/editar/{id}(id=${medico.id})}" class="btn btn-primary btn-sm">Editar</a>
            <a th:href="@{/gerente/medicos/eliminar/{id}(id=${medico.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Está seguro?')">Eliminar</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("collapsed");
    }
  </script>
</body>
</html>
