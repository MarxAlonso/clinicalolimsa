<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestión de Médicos - LOLIMSA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/gestioncitas.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
      <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list text-white"></i>
      </div>
      <h4 class="logo-container">
        <img src="/img/logo-removebg-preview.png" class="logo-img" />
      </h4>
      <nav class="nav flex-column">
       <a class="nav-link" href="#"
          ><i class="bi bi-bar-chart"></i> <span>Estadísticas</span></a
        >
        <a class="nav-link" href="gestion_citas.html"
          ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
        >
        <a class="nav-link" href="gestion_medicos.html"
          ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
        >
        <a class="nav-link" href="gestion_medicamentos.html"
          ><i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span></a
        >
        <a class="nav-link" href="gestion_pacientes.html"
          ><i class="bi bi-people"></i> <span>Gestión de Pacientes</span></a
        >
      </nav>
      <a href="/index.html" class="btn btn-danger w-100 logout-link">
        <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
      </a>
    </div>
  <div class="content mt-5">
    <h2 class="mb-4">Gestión de Médicos</h2>
    <button class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#modalRegistrar">
      <i class="bi bi-person-plus"></i> Registrar Nuevo Médico
    </button>

    <div class="row g-4">
      <!-- Card ejemplo médico para guia del diseño -->
      <div class="col-md-6 col-lg-4">
        <div class="card p-3">
          <h5><i class="bi bi-person-circle"></i> Dr. Juan Pérez</h5>
          <p><strong>ID:</strong> 101</p>
          <p><strong>Especialidad:</strong> Cardiología</p>
          <p><strong>Email:</strong> juan.perez@lolimsa.com</p>
          <div class="d-flex justify-content-between mt-3">
            <button class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i> Editar</button>
            <button class="btn btn-sm btn-danger"><i class="bi bi-trash"></i> Eliminar</button>
          </div>
        </div>
      </div>

      <!-- Aca ya se agregara mas cards de médicos ya en el springboot ps con codigo :V -->
    </div>
  </div>

  <!-- Modal para Registrar Médico una vez que le des click al boton de registrar -->
  <div class="modal fade" id="modalRegistrar" tabindex="-1" aria-labelledby="modalRegistrarLabel" aria-hidden="true">
    <div class="modal-dialog">
      <form class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="modalRegistrarLabel">Registrar Nuevo Médico</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="nombreMedico" class="form-label">Nombre Completo</label>
            <input type="text" class="form-control" id="nombreMedico" required />
          </div>
          <div class="mb-3">
            <label for="dniMedico" class="form-label">DNI</label>
            <input type="text" class="form-control" id="dniMedico" maxlength="8" required />
          </div>
          <div class="mb-3">
            <label for="especialidadMedico" class="form-label">Especialidad</label>
            <input type="text" class="form-control" id="especialidadMedico" required />
          </div>
          <div class="mb-3">
            <label for="experienciaMedico" class="form-label">Años de Experiencia</label>
            <input type="number" class="form-control" id="experienciaMedico" min="0" required />
          </div>
          <div class="mb-3">
            <label for="telefonoMedico" class="form-label">Teléfono</label>
            <input type="tel" class="form-control" id="telefonoMedico" required />
          </div>
          <div class="mb-3">
            <label for="emailMedico" class="form-label">Correo Electrónico</label>
            <input type="email" class="form-control" id="emailMedico" required />
          </div>
          <div class="mb-3">
            <label for="generoMedico" class="form-label">Género</label>
            <select id="generoMedico" class="form-select" required>
              <option value="" disabled selected>Seleccione género</option>
              <option value="Masculino">Masculino</option>
              <option value="Femenino">Femenino</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-save"></i> Guardar
          </button>
        </div>
      </form>
    </div>
  </div>
  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("collapsed");
    }
  </script>
</body>
</html>
