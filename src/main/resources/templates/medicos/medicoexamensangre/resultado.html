<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/panelmedico.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<div class="container mt-5">
    <div class="card shadow border-0 p-4 animate__animated animate__fadeInUp">
        <h2 class="text-center mb-3 text-danger fw-bold">
            <i class="bi bi-droplet-half me-2"></i>Resultado de Examen de Sangre
        </h2>

        <h5 class="text-dark">
            <i class="bi bi-person-fill me-2"></i>
            <span th:text="'Paciente: ' + ${examen.cita.paciente.firstName} + ' ' + ${examen.cita.paciente.lastName}"></span>
        </h5>
        <p>
            <strong><i class="bi bi-calendar-event me-1"></i>Fecha del examen:</strong>
            <span th:text="${#dates.format(examen.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></span>
        </p>

        <!-- 📊 Gráfico comparativo -->
        <div class="chart-container mt-4 mb-4">
            <canvas id="graficoSangre" height="200"></canvas>
        </div>

        <!-- Observaciones -->
        <div class="alert alert-info shadow-sm animate__animated animate__fadeInDown">
            <strong>Observaciones:</strong>
            <p th:text="${examen.observaciones}" class="mb-0"></p>
        </div>

        <!-- Diagnóstico automático -->
        <div class="alert alert-warning shadow-sm animate__animated animate__fadeInDown">
            <strong>Diagnóstico automático:</strong>
            <p id="resultadoDiagnostico" class="fw-bold text-danger mb-0"></p>
        </div>

        <!-- Botones -->
        <div class="text-center mt-3">
            <button class="btn btn-outline-success shadow-sm rounded-pill" onclick="exportarGrafico()">
                <i class="bi bi-bar-chart-line-fill me-2"></i>Descargar Gráfica
            </button>
        </div>

        <div class="text-center mt-2">
            <button class="btn btn-danger shadow-sm rounded-pill" onclick="descargarGraficoPDF()">
                <i class="bi bi-file-earmark-pdf-fill me-2"></i>Descargar Informe en PDF
            </button>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/medicos/sangre/ver}" class="btn btn-outline-primary px-4 rounded-pill shadow-sm">
                <i class="bi bi-arrow-left-circle me-2"></i>Volver
            </a>
        </div>
    </div>
</div>

<!-- html2canvas para capturar elementos -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- jsPDF para generar PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- ChartJS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    let hemoglobinaPromedio = [[${promedioHemoglobina}]];
    let glucosaPromedio = [[${promedioGlucosa}]];
    let colesterolPromedio = [[${promedioColesterol}]];

    let hemoglobinaPaciente = [[${examen.hemoglobina}]];
    let glucosaPaciente = [[${examen.glucosa}]];
    let colesterolPaciente = [[${examen.colesterol}]];

    const datos = {
        labels: ['Hemoglobina (g/dL)', 'Glucosa (mg/dL)', 'Colesterol (mg/dL)'],
        datasets: [
            {
                label: 'Valores Saludables',
                data: [hemoglobinaPromedio, glucosaPromedio, colesterolPromedio],
                backgroundColor: 'rgba(75, 192, 192, 0.5)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1,
                borderRadius: 5
            },
            {
                label: 'Paciente',
                data: [hemoglobinaPaciente, glucosaPaciente, colesterolPaciente],
                backgroundColor: 'rgba(255, 99, 132, 0.5)',
                borderColor: 'rgba(255, 99, 132, 1)',
                borderWidth: 1,
                borderRadius: 5
            }
        ]
    };

    const config = {
        type: 'bar',
        data: datos,
        options: {
            responsive: true,
            animation: {
                duration: 1000,
                easing: 'easeOutBounce'
            },
            plugins: {
                legend: {
                    position: 'top'
                },
                tooltip: {
                    backgroundColor: '#f0f0f0',
                    titleColor: '#000',
                    bodyColor: '#000'
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Nivel',
                        font: {
                            weight: 'bold'
                        }
                    },
                    grid: {
                        color: '#ddd'
                    }
                }
            }
        }
    };

    new Chart(document.getElementById('graficoSangre'), config);
</script>

<!-- Diagnóstico automático -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        let diagnostico = "";

        if (hemoglobinaPaciente < 12) {
            diagnostico += "Posible anemia (hemoglobina baja). ";
        }

        if (glucosaPaciente >= 126) {
            diagnostico += "Posible diabetes (glucosa alta). ";
        } else if (glucosaPaciente < 70) {
            diagnostico += "Posible hipoglucemia (glucosa baja). ";
        }

        if (colesterolPaciente >= 240) {
            diagnostico += "Colesterol alto. ";
        } else if (colesterolPaciente < 125) {
            diagnostico += "Colesterol bajo. ";
        }

        if (diagnostico === "") {
            diagnostico = "Resultados normales o dentro de rangos saludables.";
        }

        const resultadoEl = document.getElementById("resultadoDiagnostico");
        resultadoEl.textContent = diagnostico;
        resultadoEl.classList.add("animate__animated", "animate__fadeIn");
    });
</script>
<script>
    function exportarGrafico() {
        const canvas = document.getElementById("graficoSangre");
        const link = document.createElement('a');
        link.download = "grafico_examen_sangre.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
<script>
    async function descargarGraficoPDF() {
        const graficoContainer = document.querySelector('.chart-container');
        const canvas = await html2canvas(graficoContainer, { scale: 2 });

        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();

        // Título
        pdf.setFontSize(16);
        pdf.setTextColor(40);
        pdf.text("Informe de Examen de Sangre", 105, 15, null, null, "center");

        // Datos del paciente
        const nombre = document.querySelector('h5 span')?.textContent.trim() || "Paciente";
        const fecha = document.querySelector('p span')?.textContent.trim() || "Fecha";
        pdf.setFontSize(12);
        pdf.setFont("helvetica", "normal");
        pdf.text(nombre, 10, 30);
        pdf.text("Fecha del examen: " + fecha, 10, 40);

        // Gráfico
        const imgProps = pdf.getImageProperties(imgData);
        const pdfWidth = 190;
        const imgHeight = (imgProps.height * pdfWidth) / imgProps.width;
        pdf.addImage(imgData, 'PNG', 10, 50, pdfWidth, imgHeight);

        // Observaciones
        const observaciones = document.querySelector(".alert-info p")?.textContent.trim() || "Sin observaciones.";
        pdf.setFont("helvetica", "normal");
        pdf.setFontSize(12);
        pdf.text("Observaciones:", 10, 60 + imgHeight);
        pdf.setFontSize(11);
        const obsLines = pdf.splitTextToSize(observaciones, 180);
        pdf.text(obsLines, 10, 70 + imgHeight);

        // Diagnóstico
        const diagnostico = document.getElementById("resultadoDiagnostico")?.textContent.trim() || "Sin diagnóstico.";
        pdf.setFontSize(12);
        pdf.setFont("helvetica", "normal");
        pdf.text("Diagnóstico automático:", 10, 80 + imgHeight + obsLines.length * 5);
        pdf.setFont("helvetica", "bold");
        const diagLines = pdf.splitTextToSize(diagnostico, 180);
        pdf.text(diagLines, 10, 90 + imgHeight + obsLines.length * 5);

        // Descargar
        pdf.save("informe_examen_sangre.pdf");
    }
</script>


<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
