<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Exámenes de Sangre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/medico/panelmedicoexart.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<!-- Contenido -->
<div class="container mt-4 fade-in">
    <div class="welcome-section mb-5">
        <h2 class="d-flex align-items-center gap-2">
            <i class="bi bi-person-vcard-fill text-primary"></i>
            Bienvenido Dr. <span th:text="${medico.nombres} + ' ' + ${medico.apellidos}"></span>
        </h2>
    </div>

    <div class="examenes-section slide-up">
        <h3 class="d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-droplet-half text-danger"></i> Exámenes de Sangre Realizados
        </h3>
        <div class="row">
            <div th:each="examen : ${examenes}" class="col-md-4 scale-in">
                <div class="card mb-3 shadow-hover">
                    <div class="card-body">
                        <h5 class="card-title d-flex align-items-center gap-2">
                            <i class="bi bi-person-fill text-danger"></i>
                            <span th:text="'Cita #' + ${examen.cita.id} + ' - ' + ${examen.cita.paciente.firstName} + ' ' + ${examen.cita.paciente.lastName}"></span>
                        </h5>
                        <ul class="mt-3">
                            <li><strong>Hemoglobina:</strong> <span th:text="${examen.hemoglobina} + ' g/dL'"></span></li>
                            <li><strong>Glucosa:</strong> <span th:text="${examen.glucosa} + ' mg/dL'"></span></li>
                            <li><strong>Colesterol:</strong> <span th:text="${examen.colesterol} + ' mg/dL'"></span></li>
                        </ul>
                        <p class="text-muted mt-2">
                            <i class="bi bi-calendar-event"></i>
                            <small th:text="${#dates.format(examen.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></small>
                        </p>
                        <a class="btn btn-danger w-100 mt-3 d-flex align-items-center justify-content-center gap-2"
                           th:href="@{'/medicos/sangre/resultado/' + ${examen.id}}">
                            <i class="bi bi-graph-up"></i> Ver Resultado
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="citas-pendientes-section mt-5 slide-up">
        <h3 class="d-flex align-items-center gap-2 mb-4">
            <i class="bi bi-calendar2-plus-fill text-danger"></i> Citas sin Examen de Sangre
        </h3>
        <div class="row">
            <div th:if="${#lists.isEmpty(citasSinExamen)}" class="col-12">
                <div class="alert alert-info d-flex align-items-center gap-2">
                    <i class="bi bi-info-circle-fill"></i>
                    <p class="mb-0">No hay citas pendientes para examen de sangre.</p>
                </div>
            </div>
            <div th:each="cita : ${citasSinExamen}" class="col-md-4 scale-in">
                <div class="card border-danger mb-3 shadow-hover">
                    <div class="card-body">
                        <h5 class="card-title d-flex align-items-center gap-2">
                            <i class="bi bi-person-fill text-danger"></i>
                            <span th:text="'Cita #' + ${cita.id} + ' - ' + ${cita.paciente.firstName} + ' ' + ${cita.paciente.lastName}"></span>
                        </h5>
                        <p class="d-flex align-items-center gap-2 mt-3">
                            <i class="bi bi-calendar-event text-danger"></i>
                            <strong>Fecha:</strong> <span th:text="${#dates.format(cita.fecha, 'dd/MM/yyyy HH:mm')}"></span>
                        </p>
                        <a class="btn btn-danger w-100 mt-3 d-flex align-items-center justify-content-center gap-2"
                           th:href="@{'/medicos/sangre/nuevo/' + ${cita.id}}">
                            <i class="bi bi-clipboard2-plus-fill"></i> Realizar Examen
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
</body>
</html>
