<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelmedico.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <div class="text-center">
        <h2>Bienvenido al Panel Medico</h2>
    </div>

    <div class="row g-4 mt-3">
        <div class="col-md-6 col-lg-3">
            <div class="card p-3">
                <h5><i class="bi bi-person-badge-fill"></i> Pacientes</h5>
                <p>Activos: <span th:text="${totalEmpleados}">0</span></p>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card p-3">
                <h5><i class="bi bi-bag-dash-fill"></i> Medicamentos</h5>
                <p>En stock: <span th:text="${totalProductos}">0</span></p>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card p-3">
                <h5><i class="bi bi-people-fill"></i> Citas</h5>
                <p>Registrados: <span th:text="${totalClientes}">0</span></p>
            </div>
        </div>
    </div>
</div>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
</script>

</body>
</html>
