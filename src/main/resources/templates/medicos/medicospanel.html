<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelmedicogeneral.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <div class="welcome-section animate-fade-in">
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-person-badge-fill fs-1"></i>
            <div>
                <h2 class="mb-0">Bienvenido Dr. <span th:text="${medico.nombres} + ' ' + ${medico.apellidos}"></span></h2>
                <p class="text-muted mb-0 text-white">Panel de Control Médico</p>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12">
            <div class="card-custom animate-slide-up">
                <div class="card-header-custom d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-calendar2-week me-2"></i>
                        <h3 class="mb-0 fs-5">Citas Programadas</h3>
                    </div>
                    <a class="btn btn-light btn-sm d-flex align-items-center" href="/medicos/medicohistorial/buscar">
                        <i class="bi bi-search me-2"></i>
                        Buscar Historial
                    </a>
                </div>
                <div class="card-body table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th><i class="bi bi-person me-2"></i>Paciente</th>
                            <th><i class="bi bi-calendar2-date me-2"></i>Fecha</th>
                            <th><i class="bi bi-clock me-2"></i>Hora</th>
                            <th><i class="bi bi-clipboard2-pulse me-2"></i>Motivo</th>
                            <th><i class="bi bi-check-circle me-2"></i>Estado</th>
                            <th><i class="bi bi-gear me-2"></i>Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="cita : ${citas}" class="animate-card">
                            <td th:text="${cita.paciente.firstName + ' ' + cita.paciente.lastName}"></td>
                            <td th:text="${#dates.format(cita.fecha, 'yyyy-MM-dd')}"></td>
                            <td th:text="${#dates.format(cita.hora, 'HH:mm')}"></td>
                            <td th:text="${cita.motivo}"></td>
                            <td>
                                <span th:class="${cita.estado == 'Completada' ? 'badge bg-success' : 'badge bg-primary'}"
                                      th:text="${cita.estado}"></span>
                            </td>
                            <td>
                                <a class="btn btn-primary btn-sm d-flex align-items-center gap-2"
                                   th:href="@{/medicos/medicohistorial/crear(citaId=${cita.id})}">
                                    <i class="bi bi-journal-medical"></i>
                                    Comenzar
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
</script>

</body>
</html>
