<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelmedico.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <h2>Historia Clínica</h2>
    <p>Paciente: <strong th:text="${paciente.firstName + ' ' + paciente.lastName}"></strong></p>
    <p>Motivo de la cita: <strong th:text="${cita.motivo}"></strong></p>
    <form th:action="@{/medicos/medicohistorial/guardar(citaId=${cita.id})}" method="post" th:object="${historial}">
        <div class="mb-3">
            <label>Diagnóstico</label>
            <textarea class="form-control" th:field="*{diagnostico}" required></textarea>
        </div>
        <div class="mb-3">
            <label>Tratamiento</label>
            <textarea class="form-control" th:field="*{tratamiento}" required></textarea>
        </div>
        <div class="mb-3">
            <label>Observaciones</label>
            <textarea class="form-control" th:field="*{observaciones}"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
    </form>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
</script>

</body>
</html>
