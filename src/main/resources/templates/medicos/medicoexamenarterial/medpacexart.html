<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelmedico.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <h2>Bienvenido Dr. <span th:text="${medico.nombres} + ' ' + ${medico.apellidos}"></span></h2>
    <h3>Exámenes Arteriales Realizados</h3>
    <div class="row">
        <div th:each="examen : ${examenes}" class="col-md-4">
            <div class="card mb-3 shadow">
                <div class="card-body">
                    <h5 class="card-title">
                    <span th:text="'Cita #' + ${examen.cita.id} + ' - '
                                  + ${examen.cita.paciente.firstName} + ' '
                                  + ${examen.cita.paciente.lastName}"></span>
                    </h5>
                    <p>Sistólica: <span th:text="${examen.presionSistolica}"></span> mmHg</p>
                    <p>Diastólica: <span th:text="${examen.presionDiastolica}"></span> mmHg</p>
                    <p>Observaciones: <span th:text="${examen.observaciones}"></span></p>
                    <p><small th:text="${#dates.format(examen.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></small></p>

                    <a class="btn btn-outline-info mt-2"
                       th:href="@{'/medicos/arterial/resultado/' + ${examen.id}}">
                        <i class="bi bi-bar-chart-line"></i> Ver Resultado
                    </a>
                </div>
            </div>
        </div>
    </div>
    <h3 class="mt-5">Citas sin Examen Arterial</h3>
    <div class="row">
        <div th:if="${#lists.isEmpty(citasSinExamen)}" class="col-12">
            <p class="text-muted">No hay citas pendientes para examen arterial.</p>
        </div>
        <div th:each="cita : ${citasSinExamen}" class="col-md-4">
            <div class="card border-success mb-3">
                <div class="card-body">
                    <h5 class="card-title" th:text="'Cita #' + ${cita.id} + ' - ' + ${cita.paciente.firstName} + ' ' + ${cita.paciente.lastName}"></h5>
                    <p><strong>Fecha:</strong> <span th:text="${#dates.format(cita.fecha, 'dd/MM/yyyy HH:mm')}"></span></p>

                    <a class="btn btn-success mt-2" th:href="@{'/medicos/arterial/nuevo/' + ${cita.id}}">
                        <i class="bi bi-clipboard-plus"></i> Realizar Examen
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
</script>

</body>
</html>
