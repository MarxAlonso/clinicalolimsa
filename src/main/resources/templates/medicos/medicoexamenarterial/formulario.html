<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelmedico.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <h3>Formulario para Examen Arterial del Paciente</h3>

    <form th:action="@{/medicos/arterial/guardar}" th:object="${examen}" method="post">
        <input type="hidden" th:field="*{cita.id}" />

        <label>Presión Sistólica</label>
        <input type="number" step="0.01" th:field="*{presionSistolica}" class="form-control"/>

        <label>Presión Diastólica</label>
        <input type="number" step="0.01" th:field="*{presionDiastolica}" class="form-control"/>

        <label>Observaciones</label>
        <textarea th:field="*{observaciones}" class="form-control"></textarea>

        <button type="submit" class="btn btn-primary mt-3">Guardar</button>
    </form>
</div>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
</script>

</body>
</html>
