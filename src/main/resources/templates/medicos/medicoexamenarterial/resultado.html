<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet" integrity="sha384-Gu3KVV2H9d+yA4QDpVB7VcOyhJlAVrcXd0thEjr4KznfaFPLe0xQJyonVxONa4ZC" crossorigin="anonymous"/>
    <link rel="stylesheet" th:href="@{/css/panelmedico.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<!-- Contenido -->
<!--<a th:href="@{'/medicos/arterial/resultado/' + ${examen.id} + '/pdf'}"
   class="btn btn-danger px-4 rounded-pill shadow-sm mt-2">
    <i class="fas fa-file-pdf me-2"></i> Descargar PDF
</a>-->

<div class="container mt-5">
    <div class="card shadow border-0 p-4 animate__animated animate__fadeInUp">
        <h2 class="text-center mb-3 text-primary fw-bold">
            <i class="fas fa-heartbeat me-2"></i>Resultado de Examen Arterial
        </h2>

        <h5 class="text-dark">
            <i class="fas fa-user me-2"></i>
            <span th:text="'Paciente: ' + ${examen.cita.paciente.firstName} + ' ' + ${examen.cita.paciente.lastName}"></span>
        </h5>
        <p>
            <strong><i class="fas fa-calendar-alt me-1"></i>Fecha del examen:</strong>
            <span th:text="${#dates.format(examen.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></span>
        </p>

        <div class="chart-container mt-4 mb-4">
            <canvas id="graficoPresion" height="200"></canvas>
        </div>

        <div class="alert alert-info shadow-sm animate__animated animate__fadeInDown">
            <strong>Observaciones:</strong>
            <p th:text="${examen.observaciones}" class="mb-0"></p>
        </div>

        <div class="alert alert-warning shadow-sm animate__animated animate__fadeInDown">
            <strong>Diagnóstico automático:</strong>
            <p id="resultadoDiagnostico" class="fw-bold text-danger mb-0"></p>
        </div>

        <div class="text-center mt-3">
            <button class="btn btn-outline-success shadow-sm rounded-pill" onclick="exportarGrafico()">
                <i class="bi bi-bar-chart-line-fill me-2"></i>Descargar Gráfica
            </button>
        </div>

        <div class="text-center mt-2">
            <button class="btn btn-danger shadow-sm rounded-pill" onclick="descargarGraficoPDF()">
                <i class="bi bi-file-earmark-pdf-fill me-2"></i>Descargar Informe en PDF
            </button>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/medicos/arterial/ver}" class="btn btn-outline-primary px-4 rounded-pill shadow-sm">
                <i class="bi bi-arrow-left-circle me-2"></i>Volver
            </a>
        </div>


    </div>
</div>
<!-- html2canvas para capturar elementos -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
<!-- jsPDF para generar PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous"></script>
<script th:inline="javascript">
    let sistolicaPromedio = [[${sistolicaPromedio}]];
    let diastolicaPromedio = [[${diastolicaPromedio}]];
    let sistolicaPaciente = [[${examen.presionSistolica}]];
    let diastolicaPaciente = [[${examen.presionDiastolica}]];
</script>
<script th:src="@{/js/medicos/resultadoexamenarterial.js}"></script>
<script>
    function exportarGrafico() {
        const canvas = document.getElementById("graficoPresion");
        const link = document.createElement('a');
        link.download = "grafico_presion_paciente.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
<script th:src="@{/js/medicos/pdfresultadoexamenarterial.js}"></script>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
