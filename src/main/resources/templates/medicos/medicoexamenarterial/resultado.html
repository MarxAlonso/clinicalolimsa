<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/panelmedico.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<!-- Contenido -->
<div class="container mt-4">
    <h2>Resultado de Examen Arterial</h2>

    <h4 th:text="'Paciente: ' + ${examen.cita.paciente.firstName} + ' ' + ${examen.cita.paciente.lastName}"></h4>
    <p><strong>Fecha del examen:</strong> <span th:text="${#dates.format(examen.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></span></p>

    <canvas id="graficoPresion" width="400" height="200"></canvas>

    <div class="mt-4">
        <p><strong>Observaciones:</strong></p>
        <p th:text="${examen.observaciones}"></p>
    </div>
    <div class="mt-4">
        <p><strong>Diagnóstico automático:</strong></p>
        <p id="resultadoDiagnostico" class="fw-bold text-primary"></p>
    </div>

    <a th:href="@{/medicos/arterial/ver}" class="btn btn-secondary mt-3">Volver</a>
    <br><br>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    let sistolicaPromedio = [[${sistolicaPromedio}]];
    let diastolicaPromedio = [[${diastolicaPromedio}]];
    let sistolicaPaciente = [[${examen.presionSistolica}]];
    let diastolicaPaciente = [[${examen.presionDiastolica}]];

    const datos = {
        labels: ['Presión Sistólica', 'Presión Diastólica'],
        datasets: [
            {
                label: 'Saludable',
                data: [sistolicaPromedio, diastolicaPromedio],
                backgroundColor: 'rgba(75, 192, 192, 0.5)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1
            },
            {
                label: 'Paciente',
                data: [sistolicaPaciente, diastolicaPaciente],
                backgroundColor: 'rgba(255, 99, 132, 0.5)',
                borderColor: 'rgba(255, 99, 132, 1)',
                borderWidth: 1
            }
        ]
    };

    const config = {
        type: 'bar',
        data: datos,
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Presión (mmHg)'
                    }
                }
            }
        }
    };

    new Chart(document.getElementById('graficoPresion'), config);
</script>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('d-none');
    }
    let diagnostico = "";
    if (sistolicaPaciente >= 140 || diastolicaPaciente >= 90) {
        diagnostico = "Presión arterial alta (hipertensión)";
    } else if (sistolicaPaciente < 90 || diastolicaPaciente < 60) {
        diagnostico = "Presión arterial baja (hipotensión)";
    } else {
        diagnostico = "Presión arterial normal";
    }

    // Mostrar el diagnóstico en el HTML
    document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("resultadoDiagnostico").textContent = diagnostico;
    });
</script>
</body>
</html>
