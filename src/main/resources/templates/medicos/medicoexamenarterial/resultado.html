<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/panelmedico.css}">
</head>
<body>
<!-- Navbar superior -->
<div id="navbar-container"></div>
<script th:src="@{/js/medicos/navbarmedicos.js}"></script>

<!-- Contenido -->
<!--<a th:href="@{'/medicos/arterial/resultado/' + ${examen.id} + '/pdf'}"
   class="btn btn-danger px-4 rounded-pill shadow-sm mt-2">
    <i class="fas fa-file-pdf me-2"></i> Descargar PDF
</a>-->

<div class="container mt-5">
    <div class="card shadow border-0 p-4 animate__animated animate__fadeInUp">
        <h2 class="text-center mb-3 text-primary fw-bold">
            <i class="fas fa-heartbeat me-2"></i>Resultado de Examen Arterial
        </h2>

        <h5 class="text-dark">
            <i class="fas fa-user me-2"></i>
            <span th:text="'Paciente: ' + ${examen.cita.paciente.firstName} + ' ' + ${examen.cita.paciente.lastName}"></span>
        </h5>
        <p>
            <strong><i class="fas fa-calendar-alt me-1"></i>Fecha del examen:</strong>
            <span th:text="${#dates.format(examen.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></span>
        </p>

        <div class="chart-container mt-4 mb-4">
            <canvas id="graficoPresion" height="200"></canvas>
        </div>

        <div class="alert alert-info shadow-sm animate__animated animate__fadeInDown">
            <strong>Observaciones:</strong>
            <p th:text="${examen.observaciones}" class="mb-0"></p>
        </div>

        <div class="alert alert-warning shadow-sm animate__animated animate__fadeInDown">
            <strong>Diagnóstico automático:</strong>
            <p id="resultadoDiagnostico" class="fw-bold text-danger mb-0"></p>
        </div>

        <div class="text-center mt-3">
            <button class="btn btn-outline-success shadow-sm rounded-pill" onclick="exportarGrafico()">
                <i class="bi bi-bar-chart-line-fill me-2"></i>Descargar Gráfica
            </button>
        </div>

        <div class="text-center mt-2">
            <button class="btn btn-danger shadow-sm rounded-pill" onclick="descargarGraficoPDF()">
                <i class="bi bi-file-earmark-pdf-fill me-2"></i>Descargar Informe en PDF
            </button>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/medicos/arterial/ver}" class="btn btn-outline-primary px-4 rounded-pill shadow-sm">
                <i class="bi bi-arrow-left-circle me-2"></i>Volver
            </a>
        </div>


    </div>
</div>
<!-- html2canvas para capturar elementos -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- jsPDF para generar PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    let sistolicaPromedio = [[${sistolicaPromedio}]];
    let diastolicaPromedio = [[${diastolicaPromedio}]];
    let sistolicaPaciente = [[${examen.presionSistolica}]];
    let diastolicaPaciente = [[${examen.presionDiastolica}]];

    const datos = {
        labels: ['Presión Sistólica', 'Presión Diastólica'],
        datasets: [
            {
                label: 'Saludable',
                data: [sistolicaPromedio, diastolicaPromedio],
                backgroundColor: 'rgba(75, 192, 192, 0.5)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1,
                borderRadius: 5
            },
            {
                label: 'Paciente',
                data: [sistolicaPaciente, diastolicaPaciente],
                backgroundColor: 'rgba(255, 99, 132, 0.5)',
                borderColor: 'rgba(255, 99, 132, 1)',
                borderWidth: 1,
                borderRadius: 5
            }
        ]
    };

    const config = {
        type: 'bar',
        data: datos,
        options: {
            responsive: true,
            animation: {
                duration: 1000,
                easing: 'easeOutBounce'
            },
            plugins: {
                legend: {
                    position: 'top'
                },
                tooltip: {
                    backgroundColor: '#f0f0f0',
                    titleColor: '#000',
                    bodyColor: '#000'
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Presión (mmHg)',
                        font: {
                            weight: 'bold'
                        }
                    },
                    grid: {
                        color: '#ddd'
                    }
                }
            }
        }
    };

    new Chart(document.getElementById('graficoPresion'), config);
</script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        let diagnostico = "";
        if (sistolicaPaciente >= 140 || diastolicaPaciente >= 90) {
            diagnostico = "Presión arterial alta (hipertensión)";
        } else if (sistolicaPaciente < 90 || diastolicaPaciente < 60) {
            diagnostico = "Presión arterial baja (hipotensión)";
        } else {
            diagnostico = "Presión arterial normal";
        }

        const resultadoEl = document.getElementById("resultadoDiagnostico");
        resultadoEl.textContent = diagnostico;
        resultadoEl.classList.add("animate__animated", "animate__fadeIn");
    });
</script>
<script>
    function exportarGrafico() {
        const canvas = document.getElementById("graficoPresion");
        const link = document.createElement('a');
        link.download = "grafico_presion_paciente.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
<script>
    async function descargarGraficoPDF() {
        const graficoContainer = document.querySelector('.chart-container');
        const canvas = await html2canvas(graficoContainer, { scale: 2 });

        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();

        // Título
        pdf.setFontSize(16);
        pdf.setTextColor(40);
        pdf.text("Resultado de Examen Arterial", 105, 15, null, null, "center");

        // Datos del paciente (opcional: puedes agregarlos más dinámicamente)
        const nombre = document.querySelector('h5 span').textContent.trim();
        const fecha = document.querySelector('p span').textContent.trim();
        pdf.setFontSize(12);
        pdf.text(nombre, 10, 30);
        pdf.text("Fecha del examen: " + fecha, 10, 40);

        // Imagen del gráfico
        const imgProps = pdf.getImageProperties(imgData);
        const pdfWidth = 190;
        const imgHeight = (imgProps.height * pdfWidth) / imgProps.width;
        pdf.addImage(imgData, 'PNG', 10, 50, pdfWidth, imgHeight);

        // Observaciones
        const observaciones = document.querySelector(".alert-info p").textContent.trim();
        pdf.text("Observaciones:", 10, 60 + imgHeight);
        pdf.setFontSize(11);
        pdf.text(observaciones, 10, 70 + imgHeight);

        // Diagnóstico
        const diagnostico = document.getElementById("resultadoDiagnostico").textContent.trim();
        pdf.setFontSize(12);
        pdf.text("Diagnóstico automático:", 10, 80 + imgHeight);
        pdf.setFont("helvetica", "bold");
        pdf.text(diagnostico, 10, 90 + imgHeight);

        // Guardar PDF
        pdf.save("informe_presion_paciente.pdf");
    }
</script>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
