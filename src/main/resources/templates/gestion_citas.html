<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion de Citas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/gestioncitas.css}" />
  </head>
  <body>
    <div class="sidebar" id="sidebar">
      <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list text-white"></i>
      </div>
      <h4 class="logo-container">
        <img src="/img/logo-removebg-preview.png" class="logo-img" />
      </h4>
      <nav class="nav flex-column">
        <a class="nav-link" href="#"
          ><i class="bi bi-bar-chart"></i> <span>Estadísticas</span></a
        >
        <a class="nav-link" href="gestion_citas.html"
          ><i class="bi bi-calendar-check"></i> <span>Gestión de Citas</span></a
        >
        <a class="nav-link" href="gestion_medicos.html"
          ><i class="bi bi-person-badge"></i> <span>Gestión de Médicos</span></a
        >
        <a class="nav-link" href="gestion_medicamentos.html"
          ><i class="bi bi-capsule"></i> <span>Gestión de Medicamentos</span></a
        >
        <a class="nav-link" href="gestion_pacientes.html"
          ><i class="bi bi-people"></i> <span>Gestión de Pacientes</span></a
        >
      </nav>
      <a href="/index.html" class="btn btn-danger w-100 logout-link">
        <i class="bi bi-box-arrow-right me-2"></i> <span>Cerrar Sesión</span>
      </a>
    </div>
    <div class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Gestión de Citas</h3>
        <button
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#modalCrearCita"
        >
          <i class="bi bi-plus-circle"></i> Nueva Cita
        </button>
      </div>

      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <!-- el card que se veria de una cita -->
        <div class="col">
          <div class="card h-100 shadow">
            <div class="card-body">
              <h5 class="card-title">Paciente: Juan Pérez</h5>
              <p class="card-text">
                <strong>Médico:</strong> Dra. Ana Salas<br />
                <strong>Hora:</strong> 10:30 AM<br />
                <strong>Sala:</strong> 302<br />
                <strong>Piso:</strong> 3<br />
                <strong>Pabellón:</strong> B
              </p>
            </div>
            <div class="card-footer d-flex justify-content-between">
              <button class="btn btn-sm btn-warning">
                <i class="bi bi-pencil-square"></i> Editar
              </button>
              <button class="btn btn-sm btn-danger">
                <i class="bi bi-trash"></i> Eliminar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div
      class="modal fade"
      id="modalCrearCita"
      tabindex="-1"
      aria-labelledby="modalCrearCitaLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <form class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title" id="modalCrearCitaLabel">
              Crear Nueva Cita
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="paciente" class="form-label"
                >Nombre del Paciente</label
              >
              <input type="text" class="form-control" id="paciente" required />
            </div>
            <div class="mb-3">
              <label for="medico" class="form-label">Médico</label>
              <input type="text" class="form-control" id="medico" required />
            </div>
            <div class="mb-3">
              <label for="hora" class="form-label">Hora de la Cita</label>
              <input type="time" class="form-control" id="hora" required />
            </div>
            <div class="mb-3">
              <label for="sala" class="form-label">Sala</label>
              <input type="text" class="form-control" id="sala" required />
            </div>
            <div class="mb-3">
              <label for="piso" class="form-label">Piso</label>
              <input
                type="number"
                class="form-control"
                id="piso"
                min="1"
                required
              />
            </div>
            <div class="mb-3">
              <label for="pabellon" class="form-label">Pabellón</label>
              <input type="text" class="form-control" id="pabellon" required />
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-save"></i> Guardar Cita
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        sidebar.classList.toggle("collapsed");
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
